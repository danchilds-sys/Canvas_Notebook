<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas-bg: #F5F0E3;
    --card-paper: #FBF8F0;
    --card-paper-rgb: 251, 248, 240;
    --ink-neutral: #3D332A;
    --ink-faint: #8A7D68;
    --doc-bg: #DCEAE3; --doc-ink: #1F4D3D; --doc-sub: #3D7A63;
    --fic-bg: #F2D9DC; --fic-ink: #6B1F2A; --fic-sub: #A14C5A;
    --mus-bg: #F4DCC8; --mus-ink: #7A3B1A; --mus-sub: #B26A3C;
    --neu-bg: #DDD2BD; --neu-ink: #5A5042; --neu-sub: #8A7D68;
    --chord-ink: #A14C5A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--canvas-bg);
    font-family: "Inter", sans-serif; color: var(--ink-neutral);
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
  }
  #wrap, #wrap * {
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  #wrap input, #wrap textarea {
    -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    -webkit-touch-callout: default;
  }
  input, textarea { user-select: text; }
  #wrap { position: fixed; inset: 0; overflow: hidden; cursor: crosshair; background: #2A241D; }
  #canvas { position: absolute; top: 0; left: 0; width: 4000px; height: 3000px; transform-origin: 0 0; }
  #board-rect {
    position: absolute; top: 0; left: 0; background: var(--canvas-bg);
    border-radius: 14px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 10px 50px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  #board-resize-handle {
    position: absolute; right: -7px; bottom: -7px; width: 18px; height: 18px;
    border-radius: 50%; background: var(--card-paper); box-shadow: 0 0 0 0.5px rgba(0,0,0,0.25);
    cursor: nwse-resize; display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); z-index: 2; pointer-events: auto;
  }
  #board-resize-handle svg { width: 9px; height: 9px; transform: rotate(45deg); }
  #connector-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
  #items-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #selection-box {
    position: absolute; border: 1px solid #4A90E2; background: rgba(74,144,226,0.12);
    pointer-events: none; display: none; border-radius: 2px;
  }

  #connector-popup {
    position: fixed; display: flex; align-items: center; gap: 8px;
    background: var(--card-paper); border-radius: 999px; padding: 8px 10px;
    box-shadow: 0 2px 10px rgba(61,51,42,0.18), 0 0 0 0.5px rgba(0,0,0,0.06);
    z-index: 40; transform: translate(-50%, -130%);
  }
  #connector-popup.hidden { display: none; }
  .conn-color-swatch {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid transparent;
    cursor: pointer; padding: 0;
  }
  .conn-color-swatch.selected { border-color: var(--ink-neutral); }
  .conn-style-group { display: flex; align-items: center; gap: 2px; border-left: 0.5px solid var(--ink-faint); padding-left: 8px; margin-left: 2px; }
  .conn-style-btn {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: transparent; color: var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .conn-style-btn svg { width: 18px; height: 6px; }
  .conn-style-btn:hover { background: rgba(61,51,42,0.08); }
  .conn-style-btn.selected { background: rgba(61,51,42,0.14); color: var(--ink-neutral); }
  #connector-delete {
    background: none; border: none; font-size: 11px; color: var(--ink-faint);
    cursor: pointer; padding: 0 0 0 8px; border-left: 0.5px solid var(--ink-faint);
  }
  #connector-delete:hover { color: var(--fic-ink); }

  #stack-menu {
    position: fixed; display: flex; flex-direction: column;
    background: var(--card-paper); border-radius: 10px; padding: 6px;
    box-shadow: 0 2px 10px rgba(61,51,42,0.18), 0 0 0 0.5px rgba(0,0,0,0.06);
    z-index: 50; min-width: 150px;
  }
  #stack-menu.hidden { display: none; }
  #stack-menu-colors, #stack-menu-container-colors { display: flex; flex-direction: column; gap: 6px; padding: 4px 6px 8px; }
  #stack-menu-colors.hidden, #stack-menu-container-colors.hidden { display: none; }
  .shape-color-row { display: flex; gap: 6px; }
  .shape-color-swatch, .container-color-swatch {
    width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid transparent;
    cursor: pointer; padding: 0;
  }
  .shape-color-swatch.selected, .container-color-swatch.selected { border-color: var(--ink-neutral); }
  #stack-menu-fill-style { display: flex; flex-direction: column; gap: 2px; padding: 4px 6px 8px; }
  #stack-menu-fill-style.hidden { display: none; }
  .shape-fill-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: none; border: none; cursor: pointer; padding: 5px 6px; border-radius: 6px;
    font-family: "Inter", sans-serif; font-size: 12px; color: var(--ink-neutral);
    text-align: left; transition: background 0.1s;
  }
  .shape-fill-btn:hover { background: rgba(61,51,42,0.07); }
  .shape-fill-btn.selected { background: rgba(61,51,42,0.1); font-weight: 600; }
  .shape-fill-btn svg { width: 32px; height: 18px; flex-shrink: 0; color: var(--ink-neutral); }
  #stack-menu-shape-types.hidden { display: none; }
  .shape-type-mini-btn {
    background: var(--canvas-bg); border: 1.5px solid transparent; border-radius: 6px;
    padding: 5px; cursor: pointer; color: var(--ink-neutral);
    display: flex; align-items: center; justify-content: center;
  }
  .shape-type-mini-btn svg { width: 15px; height: 15px; }
  .shape-type-mini-btn:hover, .shape-type-mini-btn.selected { border-color: rgba(61,51,42,0.3); }
  .stack-menu-item {
    background: none; border: none; text-align: left;
    font-family: "Inter", sans-serif; font-size: 13px; color: var(--ink-neutral);
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
  }
  .stack-menu-item.hidden { display: none; }
  .stack-menu-item:hover { background: rgba(61,51,42,0.08); }
  #stack-menu-delete { color: var(--fic-ink); border-top: 0.5px solid rgba(61,51,42,0.1); margin-top: 4px; padding-top: 10px; }

  .card {
    position: absolute;
    border-radius: 10px;
    padding: 0;
    cursor: grab;
    box-shadow: 0 2px 8px rgba(61,51,42,0.20), 0 0 0 0.5px rgba(0,0,0,0.05);
    user-select: none;
    touch-action: none;
    overflow: hidden;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease,
                transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:active { cursor: grabbing; }
  .card.is-dragging {
    transform: scale(1.04) rotate(1deg);
    box-shadow: 0 12px 32px rgba(61,51,42,0.28), 0 0 0 0.5px rgba(0,0,0,0.1);
    z-index: 20;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card.just-landed {
    animation: card-land 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .card.just-joined-stack {
    animation: card-pop-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes card-land {
    from { transform: scale(1.04) rotate(1deg); }
    to   { transform: scale(1) rotate(0deg); }
  }
  @keyframes card-pop-in {
    from { transform: scale(0.88); opacity: 0.5; }
    to   { transform: scale(1); opacity: 1; }
  }
  .card-header { padding: 10px 12px 6px; flex-shrink: 0; background: var(--neu-bg); }
  .card-body {
    padding: 0 12px 10px; flex: 1; min-height: 0; background: var(--card-paper);
    display: flex; flex-direction: column;
  }
  .card .card-title { font-family: "Lora", serif; font-weight: 600; font-size: 15px; margin: 0 0 2px; color: var(--neu-ink); flex-shrink: 0; }
  .card .card-sub { font-size: 11px; margin: 0; color: var(--neu-sub); flex-shrink: 0; }
  .card .card-preview { font-size: 12px; line-height: 1.5; color: var(--ink-neutral); opacity: 0.75; margin: 0; padding-top: 8px; flex: 1; min-height: 0; overflow: hidden; overflow-wrap: break-word; }
  .card-preview-heading { font-family: "Lora", serif; font-weight: 600; font-size: 12.5px; opacity: 1; margin-top: 4px; }
  .card-preview-heading:first-child { margin-top: 0; }
  .card-preview-line:empty { height: 6px; }
  .card-song-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(161,76,90,0.08); border-radius: 8px;
    padding: 6px 10px; margin-top: 6px;
  }
  .card-song-pill svg { width: 14px; height: 14px; color: #A14C5A; flex-shrink: 0; }
  .card-song-pill-text { display: flex; flex-direction: column; min-width: 0; }
  .card-song-pill-title {
    font-family: "Lora", serif; font-weight: 600; font-size: 12px;
    color: #A14C5A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-song-pill-artist {
    font-family: "Inter", sans-serif; font-size: 10px;
    color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-property-badges { display: flex; flex-wrap: wrap; gap: 4px; padding-top: 8px; flex-shrink: 0; }
  .card-property-badge {
    font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 999px;
    background: rgba(61,51,42,0.08); color: var(--ink-neutral);
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card.cat-documentary .card-header { background: var(--doc-bg); }
  .card.cat-documentary .card-title { color: var(--doc-ink); }
  .card.cat-documentary .card-sub { color: var(--doc-sub); }
  .card.cat-fiction .card-header { background: var(--fic-bg); }
  .card.cat-fiction .card-title { color: var(--fic-ink); }
  .card.cat-fiction .card-sub { color: var(--fic-sub); }
  .card.cat-music .card-header { background: var(--mus-bg); }
  .card.cat-music .card-title { color: var(--mus-ink); }
  .card.cat-music .card-sub { color: var(--mus-sub); }

  .img-item {
    position: absolute;
    border-radius: 6px;
    box-shadow: 0 3px 10px rgba(61,51,42,0.22), 0 0 0 0.5px rgba(0,0,0,0.08);
    cursor: grab;
    touch-action: none;
    pointer-events: auto;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
  }
  .img-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; display: block; pointer-events: none; }

  /* ---- Video item (board) ---- */
  .video-item {
    position: absolute; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(61,51,42,0.28), 0 0 0 0.5px rgba(0,0,0,0.1);
    cursor: grab; touch-action: none; pointer-events: auto; display: flex; flex-direction: column;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
    background: #1a1410;
  }
  .video-item.is-dragging { cursor: grabbing; }
  .video-item-toolbar {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: rgba(26,20,16,0.95); flex-shrink: 0; min-height: 32px;
  }
  .video-item-title {
    flex: 1; min-width: 0; font-family: "Inter", sans-serif; font-size: 11px;
    color: rgba(251,248,240,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .video-item-btn {
    background: none; border: none; cursor: pointer; padding: 3px;
    color: rgba(251,248,240,0.45); display: flex; align-items: center; justify-content: center;
    border-radius: 4px; flex-shrink: 0; transition: color 0.12s, background 0.12s;
  }
  .video-item-btn:hover { color: rgba(251,248,240,0.9); background: rgba(255,255,255,0.08); }
  .video-item-btn.danger:hover { color: #E07A7A; }
  .video-item-btn svg { width: 13px; height: 13px; }
  .video-item-embed {
    flex: 1; position: relative; cursor: pointer; overflow: hidden;
    background: #1a1410;
  }
  .video-item-thumb {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; transition: opacity 0.2s;
  }
  .video-item-play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.25); transition: background 0.2s;
  }
  .video-item-embed:hover .video-item-play-overlay { background: rgba(0,0,0,0.1); }
  .video-item-play-btn {
    width: 64px; height: 44px; background: #FF0000; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    transition: transform 0.15s, background 0.15s;
  }
  .video-item-embed:hover .video-item-play-btn { transform: scale(1.08); background: #cc0000; }
  .video-item-play-btn svg { width: 22px; height: 22px; fill: white; margin-left: 3px; }
  .video-item-drag-shield {
    position: absolute; inset: 0; z-index: 2;
    background: transparent; cursor: grab;
  }
  .video-item.is-dragging .video-item-drag-shield { cursor: grabbing; }
  .video-item.selected { outline: 2px solid #4A90E2; outline-offset: 2px; }
  .video-embed-error {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    background: #1a1410; color: rgba(251,248,240,0.7);
    font-family: "Inter", sans-serif; text-align: center; padding: 20px;
  }
  .video-embed-error svg { opacity: 0.4; }
  .video-embed-error-title {
    font-size: 13px; font-weight: 600; color: rgba(251,248,240,0.85);
  }
  .video-embed-error-sub {
    font-size: 11px; color: rgba(251,248,240,0.45); margin-top: -4px;
  }
  .video-embed-error-link {
    margin-top: 4px; display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px; padding: 7px 16px;
    font-size: 12px; font-weight: 500; color: rgba(251,248,240,0.8);
    text-decoration: none; transition: background 0.12s, color 0.12s;
  }
  .video-embed-error-link:hover { background: rgba(255,255,255,0.14); color: white; }
  .video-embed-error-link svg { width: 12px; height: 12px; opacity: 0.7; }

  /* Video card block */
  .block-video { padding: 4px 0; }
  .video-block-url-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
  }
  .video-block-url-input {
    flex: 1; border: 1px solid rgba(61,51,42,0.15); border-radius: 6px;
    background: rgba(61,51,42,0.04); padding: 5px 8px; outline: none;
    font-family: "Inter", sans-serif; font-size: 12px; color: var(--ink-neutral);
    -webkit-user-select: text; user-select: text;
  }
  .video-block-url-input::placeholder { color: var(--ink-faint); }
  .video-block-url-input:focus { border-color: rgba(61,51,42,0.35); }
  .video-block-url-btn {
    background: rgba(61,51,42,0.08); border: none; border-radius: 6px;
    font-family: "Inter", sans-serif; font-size: 11px; color: var(--ink-neutral);
    padding: 5px 10px; cursor: pointer; flex-shrink: 0; transition: background 0.12s;
  }
  .video-block-url-btn:hover { background: rgba(61,51,42,0.14); }
  .video-block-embed {
    position: relative; width: 100%; padding-bottom: 56.25%;
    border-radius: 8px; overflow: hidden; background: #1a1410; cursor: pointer;
  }
  .video-block-embed img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .video-block-embed .video-item-play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.25);
  }
  .video-block-embed:hover .video-item-play-overlay { background: rgba(0,0,0,0.1); }
  .video-block-embed .video-item-play-btn {
    width: 52px; height: 36px; background: #FF0000; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5); transition: transform 0.15s;
  }
  .video-block-embed:hover .video-item-play-btn { transform: scale(1.08); }
  .video-block-embed .video-item-play-btn svg { width: 18px; height: 18px; fill: white; margin-left: 3px; }
  /* ---- End video ---- */
  .shape-item {
    position: absolute; cursor: grab;
    touch-action: none; pointer-events: auto;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
  }
  .shape-item:active { cursor: grabbing; }
  .shape-fill {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    filter: drop-shadow(0 3px 5px rgba(61,51,42,0.28));
    pointer-events: none; box-sizing: border-box;
  }
  .container-box {
    position: absolute; border-radius: 10px; cursor: grab;
    touch-action: none; pointer-events: auto;
    background: rgba(61,51,42,0.035);
    border: 1.5px solid rgba(61,51,42,0.18);
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
  }
  .container-box:active { cursor: grabbing; }
  .container-label {
    position: absolute; top: -24px; left: 0; font-size: 12px; font-weight: 500;
    color: var(--ink-faint); font-family: "Inter", sans-serif;
    background: transparent; border: none; outline: none; padding: 0 2px;
    max-width: 90%;
  }
  .card.selected, .img-item.selected, .shape-item.selected, .card-group-frame.selected {
    outline: 2px solid #4A90E2; outline-offset: 2px;
  }
  .group-resize-handle {
    position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
    width: 10px; height: 32px; cursor: ew-resize;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s ease; z-index: 2;
    color: var(--ink-faint); pointer-events: none;
  }
  .group-resize-handle svg { width: 8px; height: 16px; }
  .card-group-frame.selected .group-resize-handle { opacity: 1; pointer-events: auto; }
  .card-group-frame:hover .group-resize-handle { opacity: 0.5; pointer-events: auto; }
  .resize-handle {
    position: absolute; right: -5px; bottom: -5px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--card-paper); box-shadow: 0 0 0 0.5px rgba(0,0,0,0.2);
    cursor: nwse-resize; display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint);
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .resize-handle svg { width: 9px; height: 9px; transform: rotate(45deg); }
  .selected .resize-handle,
  .selected > .resize-handle { opacity: 1; pointer-events: auto; }

  .connect-handle {
    position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--card-paper); box-shadow: 0 0 0 0.5px rgba(0,0,0,0.25);
    cursor: crosshair;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .selected .connect-handle,
  .selected > .connect-handle { opacity: 1; pointer-events: auto; }

  .deform-handle {
    position: absolute; left: -5px; top: -5px; width: 16px; height: 16px;
    border-radius: 50%; background: #A14C5A; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.2);
    cursor: crosshair; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 2;
  }
  .deform-handle svg { width: 8px; height: 8px; }
  .selected .deform-handle,
  .selected > .deform-handle { opacity: 1; pointer-events: auto; }

  #toolbar {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    display: flex; gap: 10px; background: rgba(var(--card-paper-rgb), 0.38); border-radius: 999px;
    padding: 8px 10px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    z-index: 20;
  }
  #board-title-bar {
    position: fixed; left: 50%; top: 20px; transform: translateX(-50%);
    background: rgba(var(--card-paper-rgb), 0.38); border-radius: 999px;
    padding: 10px 22px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    z-index: 20;
  }
  #board-title-input {
    border: none; background: transparent; outline: none;
    font-family: "Lora", serif; font-weight: 600; font-size: 15px; color: var(--ink-neutral);
    text-align: center; min-width: 120px;
  }
  #board-title-input::placeholder { color: var(--ink-faint); }
  .tool-btn {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: none; cursor: pointer;
    font-family: "Inter", sans-serif; font-size: 13px; color: var(--ink-neutral);
    padding: 8px 14px; border-radius: 999px;
  }

    display: flex; align-items: center; justify-content: center;
  }
  .card-block:hover > .block-remove-btn { opacity: 1; }
  .card-block > .block-remove-btn:hover { background: rgba(161,76,90,0.2); color: var(--chord-ink); }

  .card-card .card-block > .block-remove-btn { display: none; }

  .card-card .card-notes-rendered { padding: 0; }

  .card-card .card-notes-rendered .song-chord-line { font-size: 9px; }
  .card-card .card-notes-rendered .song-lyric-line { font-size: 10px; }
  .card-card .card-notes-rendered .song-verse { margin-bottom: 8px; }

  .card-card .card-notes-rendered { font-size: 11px; }

  .card-card .card-notes-rendered .song-section-label { font-size: 8px; }

  .card-card .song-edit-bar, .card-card .song-empty-state { display: none; }
  /* ---- End block system ---- */

  .card-group-frame {
    position: absolute;
    border: 1.5px dashed rgba(61,51,42,0.22);
    border-radius: 12px;
    pointer-events: none;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
  }
  .card-group-frame.table-mode {
    border-radius: 12px 12px 0 0;
    border-bottom: none;
  }
  .card-group-drag-bar {
    height: 8px; cursor: grab; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 11px 11px 0 0;
    pointer-events: auto;
  }
  .card-group-drag-bar:active { cursor: grabbing; }
  .card-group-drag-bar-dots {
    display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s;
  }
  .card-group-frame:hover .card-group-drag-bar-dots { opacity: 1; }
  .card-group-drag-bar-dots span {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--ink-faint); display: block;
  }
  .card-group-header {
    position: absolute; top: 8px; left: 0; right: 0; height: 32px;
    display: flex; align-items: center; gap: 6px; padding: 0 10px;
    cursor: grab; pointer-events: auto;
    background: rgba(255,255,255,0.5);
    overflow: hidden; box-sizing: border-box;
  }
  .card-group-frame:not(.table-mode) .card-group-header {
    border-bottom: 1.5px dashed rgba(61,51,42,0.22);
    border-radius: 0;
  }
  .card-group-header:active { cursor: grabbing; }
  .card-group-title-input {
    flex: 1; min-width: 0; border: none; background: transparent; outline: none;
    font-family: "Lora", serif; font-weight: 600; font-size: 13px; color: var(--ink-neutral); padding: 0;
  }
  .card-group-title-input::placeholder { color: var(--ink-faint); }
  .group-collapse-btn {
    background: none; border: none; cursor: pointer; padding: 2px; flex-shrink: 0;
    color: var(--ink-faint); display: flex; align-items: center; justify-content: center;
  }
  .group-collapse-btn svg { width: 14px; height: 14px; }
  .group-collapse-btn:hover { color: var(--ink-neutral); }
  .group-count-badge {
    font-size: 11px; color: var(--ink-faint); background: rgba(61,51,42,0.08);
    border-radius: 999px; padding: 2px 7px; flex-shrink: 0;
  }
  .unstack-btn {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--ink-faint); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .unstack-btn svg { width: 14px; height: 14px; }
  .unstack-btn:hover { color: var(--ink-neutral); }
  .unstack-confirm {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    background: var(--fic-bg); border-radius: 999px; padding: 3px 8px 3px 6px;
    font-size: 11px; font-family: "Inter", sans-serif; color: var(--fic-ink);
  }
  .unstack-confirm-yes {
    background: var(--fic-ink); color: var(--card-paper); border: none;
    border-radius: 999px; font-size: 10px; font-family: "Inter", sans-serif; font-weight: 600;
    cursor: pointer; padding: 2px 7px;
  }
  .unstack-confirm-no {
    background: none; border: none; cursor: pointer; font-size: 14px; color: var(--fic-ink);
    padding: 0 2px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }

  .group-view-toggle { display: flex; gap: 1px; background: rgba(61,51,42,0.08); border-radius: 999px; padding: 2px; flex-shrink: 0; }
  .group-view-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: var(--ink-faint); display: flex; align-items: center; justify-content: center; border-radius: 999px;
  }
  .group-view-btn svg { width: 12px; height: 12px; }
  .group-view-btn.selected { background: var(--card-paper); color: var(--ink-neutral); }

  .card-group-table {
    position: absolute; background: var(--card-paper);
    border-radius: 0 0 11px 11px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(61,51,42,0.20), 0 0 0 0.5px rgba(0,0,0,0.05);
    pointer-events: auto;
    transition: left 0.22s ease, top 0.22s ease, width 0.22s ease, height 0.22s ease;
  }
  .table-row { display: flex; border-bottom: 0.5px solid rgba(61,51,42,0.1); }
  .table-row.table-header-row { border-bottom: 1px solid rgba(61,51,42,0.18); }
  .table-cell {
    flex-shrink: 0; padding: 7px 10px; font-size: 12px; color: var(--ink-neutral);
    border-right: 0.5px solid rgba(61,51,42,0.08); display: flex; align-items: center;
    overflow: hidden; box-sizing: border-box;
  }
  .table-cell.table-name-cell { font-family: "Lora", serif; font-weight: 600; cursor: pointer; }
  .table-cell.table-name-cell:hover { text-decoration: underline; }
  .table-header-cell {
    flex-shrink: 0; padding: 7px 10px; font-size: 11px; color: var(--ink-faint); font-weight: 600;
    border-right: 0.5px solid rgba(61,51,42,0.08); box-sizing: border-box;
  }
  .table-add-col-btn {
    flex-shrink: 0; width: 28px; background: none; border: none; cursor: pointer;
    color: var(--ink-faint); display: flex; align-items: center; justify-content: center;
  }
  .table-add-col-btn:hover { color: var(--ink-neutral); background: rgba(61,51,42,0.06); }
  .table-add-row-btn {
    width: 100%; background: none; border: none; cursor: pointer; text-align: left;
    padding: 7px 10px; font-size: 12px; color: var(--ink-faint);
  }
  .table-add-row-btn:hover { color: var(--ink-neutral); background: rgba(61,51,42,0.04); }
  .table-cell-input {
    width: 100%; border: none; background: transparent; outline: none;
    font-family: "Inter", sans-serif; font-size: 12px; color: var(--ink-neutral); padding: 0;
  }
  .table-tag-pill {
    display: inline-flex; align-items: center; font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 999px; cursor: pointer; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .table-tag-empty { color: var(--ink-faint); font-size: 11px; cursor: pointer; }

  #property-create-popup, #option-picker-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--card-paper); border-radius: 12px; padding: 14px;
    box-shadow: 0 8px 30px rgba(61,51,42,0.28), 0 0 0 0.5px rgba(0,0,0,0.08);
    z-index: 70; width: 240px;
  }
  #property-create-popup.hidden, #option-picker-popup.hidden { display: none; }

  #shape-type-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card-paper); border-radius: 14px; padding: 16px;
    box-shadow: 0 8px 40px rgba(61,51,42,0.28), 0 0 0 0.5px rgba(0,0,0,0.08);
    z-index: 70; width: 280px;
    opacity: 1; visibility: visible;
  }
  #shape-type-popup.hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
    transform: translate(-50%, -50%) scale(0.88);
    transition: opacity 0.16s ease, transform 0.16s ease, visibility 0s linear 0.16s;
  }

  .shape-picker-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px; margin-top: 12px;
  }
  .shape-picker-section-label:first-child { margin-top: 0; }
  .shape-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .shape-type-btn {
    background: var(--canvas-bg); border: 2px solid transparent; border-radius: 8px;
    padding: 0; cursor: pointer; color: var(--ink-neutral);
    display: flex; align-items: center; justify-content: center;
    aspect-ratio: 1; width: 100%;
  }
  .shape-type-btn svg { width: 28px; height: 28px; }
  .shape-type-btn:hover { border-color: rgba(61,51,42,0.22); }
  .shape-type-btn.selected { border-color: var(--ink-neutral); background: var(--card-paper); }
  .shape-picker-colors {
    display: flex; flex-wrap: wrap; gap: 7px;
  }
  .shape-picker-color-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .shape-picker-color-btn:hover { outline: 2px solid rgba(61,51,42,0.2); outline-offset: 1px; }
  .shape-picker-color-btn.selected { border-color: var(--ink-neutral); }
  #shape-picker-confirm {
    width: 100%; margin-top: 14px; background: var(--neu-ink); color: var(--card-paper);
    border: none; border-radius: 999px; font-size: 13px; cursor: pointer;
    padding: 9px; font-family: "Inter", sans-serif; font-weight: 500;
  }
  #shape-picker-confirm:hover { opacity: 0.88; }

  .shape-type-btn.selected { border-color: rgba(61,51,42,0.25); }
  #popup-scrim {
    position: fixed; inset: 0; background: rgba(31,23,16,0.25); z-index: 65;
  }
  #popup-scrim.hidden { display: none; }
  #property-name-input {
    width: 100%; border: none; border-bottom: 1px solid rgba(61,51,42,0.15);
    background: transparent; outline: none; font-size: 13px; color: var(--ink-neutral);
    padding: 0 0 6px; margin-bottom: 10px; font-family: "Inter", sans-serif;
  }
  .property-type-picker { display: flex; gap: 6px; margin-bottom: 10px; }
  .property-type-btn {
    flex: 1; background: var(--canvas-bg); border: 1.5px solid transparent; border-radius: 8px;
    padding: 6px 4px; font-size: 11px; color: var(--ink-neutral); cursor: pointer;
    font-family: "Inter", sans-serif;
  }
  .property-type-btn.selected { border-color: var(--ink-neutral); }
  #property-create-confirm, #option-picker-new-confirm {
    width: 100%; background: var(--neu-ink); color: var(--card-paper); border: none;
    border-radius: 999px; font-size: 12px; cursor: pointer; padding: 7px; font-family: "Inter", sans-serif;
  }
  #option-picker-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; max-height: 160px; overflow-y: auto; }
  .option-picker-row {
    display: flex; align-items: center; justify-content: space-between;
    border-radius: 8px; padding: 4px 4px 4px 8px; cursor: pointer;
  }
  .option-picker-row:hover { background: var(--canvas-bg); }
  #option-picker-new-input {
    width: 100%; border: none; border-bottom: 1px solid rgba(61,51,42,0.15);
    background: transparent; outline: none; font-size: 12px; color: var(--ink-neutral);
    padding: 0 0 6px; margin-bottom: 8px; font-family: "Inter", sans-serif;
  }

  #modal-notes {
    width: 100%; min-height: 140px; border: none; background: transparent;
    font-family: "Inter", sans-serif; font-size: 14px; line-height: 1.7; color: var(--ink-neutral);
    outline: none; resize: none; padding: 0; margin-top: 0; flex: 1;
  }
  #modal-notes::placeholder { color: var(--ink-faint); }
  #modal-delete {
    margin-top: 16px; background: none; border: none; color: var(--ink-faint);
    font-size: 12px; cursor: pointer; padding: 0; flex-shrink: 0;
  }
  #modal-delete:hover { color: var(--fic-ink); }
  #delete-confirm {
    margin-top: 16px; display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--ink-faint); flex-shrink: 0;
  }
  #delete-confirm.hidden { display: none; }
  #delete-confirm-yes {
    background: none; border: none; color: var(--fic-ink); font-weight: 500;
    font-size: 12px; cursor: pointer; padding: 0;
  }
  #delete-confirm-cancel {
    background: none; border: none; color: var(--ink-faint);
    font-size: 12px; cursor: pointer; padding: 0;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<div id="wrap">
  <div id="canvas">
    <div id="board-rect">
      <div id="board-resize-handle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    </div>
    <svg id="connector-layer">
      <defs>
        <filter id="line-shadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3D332A" flood-opacity="0.25"/>
        </filter>
      </defs>
      <g id="connector-lines-group"></g>
    </svg>
    <div id="items-layer"></div>
    <div id="selection-box"></div>
  </div>
</div>

<div id="board-title-bar">
  <input id="board-title-input" placeholder="Untitled board">
</div>

<div id="toolbar">
  <button class="tool-btn toolbar-icon-only" id="add-card-btn" title="Add card">

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="2.5"/>
      <path d="M3 9.5h18"/>
      <path d="M6.5 6.8h6"/>
    </svg>
  </button>
  <label class="tool-btn toolbar-icon-only" id="add-image-btn" title="Add image">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="16" rx="2"/>
      <circle cx="8.5" cy="9.5" r="1.5"/>
      <path d="M21 15l-5-5L5 20"/>
    </svg>
    <input type="file" id="image-input" accept="image/*" hidden>
  </label>
  <button class="tool-btn toolbar-icon-only" id="add-video-btn" title="Add YouTube video">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2.5"/>
      <polygon points="10,9 16,12 10,15" fill="currentColor" stroke="none"/>
    </svg>
  </button>
  <button class="tool-btn toolbar-icon-only" id="add-shape-btn" title="Add shape">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7" width="11" height="11" rx="1.5"/>
      <circle cx="16.5" cy="9.5" r="4.5"/>
    </svg>
  </button>
  <button class="tool-btn toolbar-icon-only" id="add-container-btn" title="Add container box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2.5">
      <rect x="3" y="4" width="18" height="16" rx="2"/>
    </svg>
  </button>
  <button class="tool-btn toolbar-icon-only" id="zoom-fit-btn" title="Zoom to fit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9V4h5"/>
      <path d="M21 9V4h-5"/>
      <path d="M3 15v5h5"/>
      <path d="M21 15v5h-5"/>
    </svg>
  </button>
  <button class="tool-btn toolbar-icon-only" id="canvas-color-btn" title="Canvas colour">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="8.2" cy="10" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="7.2" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="15.8" cy="10" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="13" cy="15.2" r="1.3" fill="currentColor" stroke="none"/>
    </svg>
  </button>
</div>

<div id="canvas-color-popup" class="hidden">
  <div class="color-temp-group">
    <button class="canvas-color-swatch" data-color="warm-light" style="background:#F8F2E3;" title="Warm, light"></button>
    <button class="canvas-color-swatch" data-color="warm-mid" style="background:#F5F0E3;" title="Warm, mid"></button>
    <button class="canvas-color-swatch" data-color="warm-deep" style="background:#EEE1C8;" title="Warm, deep"></button>
  </div>
  <div class="color-temp-group">
    <button class="canvas-color-swatch" data-color="neutral-light" style="background:#F4F2E9;" title="Neutral, light"></button>
    <button class="canvas-color-swatch" data-color="neutral-mid" style="background:#EEEBE2;" title="Neutral, mid"></button>
    <button class="canvas-color-swatch" data-color="neutral-deep" style="background:#E6E2D5;" title="Neutral, deep"></button>
  </div>
  <div class="color-temp-group">
    <button class="canvas-color-swatch" data-color="cool-light" style="background:#EFF1E9;" title="Cool, light"></button>
    <button class="canvas-color-swatch" data-color="cool-mid" style="background:#E8EAE0;" title="Cool, mid"></button>
    <button class="canvas-color-swatch" data-color="cool-deep" style="background:#E1E4D8;" title="Cool, deep"></button>
  </div>
</div>

<div id="group-suggest-chip" class="hidden">
  <button id="group-suggest-btn">Stack these cards</button>
</div>

<div id="stack-drop-chip">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  <span id="stack-drop-label">Add to stack?</span>
  <button id="stack-drop-yes">Add</button>
  <button id="stack-drop-no">Cancel</button>
</div>

<div id="group-create-popup" class="hidden">
  <div class="group-popup-label">Stack order</div>
  <div id="group-order-list"></div>
  <div class="group-popup-actions">
    <button id="group-create-cancel">Cancel</button>
    <button id="group-create-confirm">Create stack</button>
  </div>
</div>

<div id="popup-scrim" class="hidden"></div>

<div id="property-create-popup" class="hidden">
  <input id="property-name-input" placeholder="Column name">
  <div class="property-type-picker">
    <button type="button" class="property-type-btn selected" data-type="text">Text</button>
    <button type="button" class="property-type-btn" data-type="number">123</button>
    <button type="button" class="property-type-btn" data-type="select">Tag</button>
  </div>
  <button id="property-create-confirm">Add column</button>
</div>

<div id="option-picker-popup" class="hidden">
  <div id="option-picker-list"></div>
  <input id="option-picker-new-input" placeholder="Create new...">
  <button id="option-picker-new-confirm">Add</button>
</div>

<div id="shape-type-popup" class="hidden">
  <div class="shape-picker-section-label">Shape</div>
  <div class="shape-type-grid">
    <button class="shape-type-btn" data-shape="rectangle" title="Rectangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/></svg>
    </button>
    <button class="shape-type-btn" data-shape="circle" title="Circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/></svg>
    </button>
    <button class="shape-type-btn" data-shape="triangle" title="Triangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l9 16H3Z"/></svg>
    </button>
    <button class="shape-type-btn" data-shape="star" title="Star">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7-6.2-3.8-6.2 3.8 1.6-7L2 9.2l7.1-.6z"/></svg>
    </button>
    <button class="shape-type-btn" data-shape="arrow" title="Arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h14M13 6l6 6-6 6"/></svg>
    </button>
    <button class="shape-type-btn" data-shape="chevron" title="Chevron">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5l8 7-8 7"/></svg>
    </button>
  </div>
  <div class="shape-picker-section-label">Colour</div>
  <div class="shape-picker-colors">
    <button class="shape-picker-color-btn" data-color="sand" style="background:#DDD2BD;" title="Sand"></button>
    <button class="shape-picker-color-btn" data-color="sage" style="background:#C3D6BC;" title="Sage"></button>
    <button class="shape-picker-color-btn" data-color="sky" style="background:#C2D8EC;" title="Sky"></button>
    <button class="shape-picker-color-btn" data-color="blush" style="background:#EFCBCE;" title="Blush"></button>
    <button class="shape-picker-color-btn" data-color="yellow" style="background:#EDE0AE;" title="Yellow"></button>
    <button class="shape-picker-color-btn" data-color="sand-bright" style="background:#E0883A;" title="Amber"></button>
    <button class="shape-picker-color-btn" data-color="sage-bright" style="background:#4FAF54;" title="Green"></button>
    <button class="shape-picker-color-btn" data-color="sky-bright" style="background:#3B82C4;" title="Blue"></button>
    <button class="shape-picker-color-btn" data-color="blush-bright" style="background:#E0527A;" title="Rose"></button>
    <button class="shape-picker-color-btn" data-color="yellow-bright" style="background:#E8B92E;" title="Gold"></button>
  </div>
  <button id="shape-picker-confirm">Add to board</button>
</div>

<div id="connector-popup" class="hidden">

<script>
(function () {
  var STORE_KEY = "canvas-state-v1";
  var SVG_NS = "http://www.w3.org/2000/svg";
  var wrap = document.getElementById("wrap");
  var canvas = document.getElementById("canvas");
  var boardRect = document.getElementById("board-rect");
  var boardResizeHandle = document.getElementById("board-resize-handle");
  var itemsLayer = document.getElementById("items-layer");
  var connectorLayer = document.getElementById("connector-layer");
  var connectorLinesGroup = document.getElementById("connector-lines-group");
  var connectorPopup = document.getElementById("connector-popup");
  var overlay = document.getElementById("overlay");
  var modal = document.getElementById("modal");
  var modalResizeHandle = document.getElementById("modal-resize-handle");
  var modalTitle = document.getElementById("modal-title");
  var modalNotes = document.getElementById("modal-notes");
  var modalDelete = document.getElementById("modal-delete");
  var cardImageGallery = document.getElementById("card-image-gallery");
  var cardImageInput = document.getElementById("card-image-input");
  var catSwatches = document.querySelectorAll(".cat-icon-btn");

  var state = { cards: [], images: [], connections: [] };
  var panX = 220, panY = 140, scale = 1;
  var activeCardId = null;
  var activeConnectionId = null;
  var selectedCardIds = new Set();
  var selectedImageIds = new Set();
  var selectedShapeIds = new Set();
  var selectedGroupIds = new Set();

  var CONNECTOR_COLORS = {
    taupe: "#C9824A",
    rose: "#E0527A",
    slate: "#3D7DCC",
    olive: "#C9A227",
    "light-grey": "#B0ABA4",
    "mid-grey": "#7A7570",
    charcoal: "#3A3530",
    black: "#1A1714"
  };

  var CONNECTOR_DASH = {
    solid: "none",
    dashed: "9 6",
    dotted: "0.1 8"
  };

  var TAG_PALETTE = [
    { bg: "#DCEAE3", ink: "#1F4D3D" },
    { bg: "#F2D9DC", ink: "#6B1F2A" },
    { bg: "#F4DCC8", ink: "#7A3B1A" },
    { bg: "#DDE3F2", ink: "#2A3F6B" },
    { bg: "#E8DCF2", ink: "#4A2A6B" },
    { bg: "#F2E8DC", ink: "#6B4A1F" },
    { bg: "#DCF2E8", ink: "#1F6B4A" },
    { bg: "#F2DCDC", ink: "#6B1F1F" }
  ];

  function nextTagColor(usedCount) {
    return TAG_PALETTE[usedCount % TAG_PALETTE.length];
  }

  var CATEGORY_BG = {
    documentary: "var(--doc-bg)",
    fiction: "var(--fic-bg)",
    music: "var(--mus-bg)",
    idea: "var(--neu-bg)"
  };

  var CATEGORY_INK = {
    documentary: "var(--doc-ink)",
    fiction: "var(--fic-ink)",
    music: "var(--mus-ink)",
    idea: "var(--neu-ink)"
  };

  function setModalHeaderColor(category) {
    document.getElementById("modal-header").style.background = CATEGORY_BG[category] || "var(--neu-bg)";
    modalTitle.style.color = CATEGORY_INK[category] || "var(--neu-ink)";
  }

  var CANVAS_PALETTE = {
    "warm-light": "#F8F2E3",
    "warm-mid": "#F5F0E3",
    "warm-deep": "#EEE1C8",
    "neutral-light": "#F4F2E9",
    "neutral-mid": "#EEEBE2",
    "neutral-deep": "#E6E2D5",
    "cool-light": "#EFF1E9",
    "cool-mid": "#E8EAE0",
    "cool-deep": "#E1E4D8"
  };

  function applyCanvasColor(key) {
    var hex = CANVAS_PALETTE[key] || CANVAS_PALETTE["warm-mid"];
    document.documentElement.style.setProperty("--canvas-bg", hex);
    document.querySelectorAll(".canvas-color-swatch").forEach(function (sw) {
      sw.classList.toggle("selected", sw.dataset.color === key);
    });
  }

  var canvasColorPopup = document.getElementById("canvas-color-popup");

  function openCanvasColorPopup() {
    closeConnectorPopup();
    closeStackMenu();
    closeGroupCreatePopup();
    canvasColorPopup.classList.remove("hidden");
  }

  function closeCanvasColorPopup() {
    canvasColorPopup.classList.add("hidden");
  }

  document.getElementById("canvas-color-btn").addEventListener("click", function (e) {
    e.stopPropagation();
    if (canvasColorPopup.classList.contains("hidden")) openCanvasColorPopup();
    else closeCanvasColorPopup();
  });

  document.getElementById("zoom-fit-btn").addEventListener("click", function (e) {
    e.stopPropagation();
    zoomToFit();
  });

  var SHAPE_DEFAULT_SIZE = {
    rectangle: { width: 140, height: 100 },
    circle: { width: 120, height: 120 },
    triangle: { width: 130, height: 120 },
    star: { width: 130, height: 130 },
    arrow: { width: 150, height: 90 },
    chevron: { width: 110, height: 120 }
  };

  var shapeTypePopup = document.getElementById("shape-type-popup");
  var pickerSelectedType = "rectangle";
  var pickerSelectedColor = "sand";

  function updateShapePickerSelection() {
    document.querySelectorAll(".shape-type-btn").forEach(function (btn) {
      btn.classList.toggle("selected", btn.dataset.shape === pickerSelectedType);
    });
    document.querySelectorAll(".shape-picker-color-btn").forEach(function (btn) {
      btn.classList.toggle("selected", btn.dataset.color === pickerSelectedColor);
    });
  }

  document.getElementById("add-shape-btn").addEventListener("click", function (e) {
    e.stopPropagation();
    closeConnectorPopup();
    closeStackMenu();
    closeCanvasColorPopup();
    closeGroupCreatePopup();
    updateShapePickerSelection();
    showPopupScrim();

    // Show it briefly with no transition so we can measure its final position
    shapeTypePopup.style.transition = "none";
    shapeTypePopup.style.transform = "translate(-50%, -50%) scale(1)";
    shapeTypePopup.style.opacity = "1";
    shapeTypePopup.classList.remove("hidden");

    // Compute the origin (toolbar button) and the popup's natural centre
    var btnRect = e.currentTarget.getBoundingClientRect();
    var popRect = shapeTypePopup.getBoundingClientRect();
    var btnCX = btnRect.left + btnRect.width / 2;
    var btnCY = btnRect.top + btnRect.height / 2;
    var popCX = popRect.left + popRect.width / 2;
    var popCY = popRect.top + popRect.height / 2;
    var dx = btnCX - popCX;
    var dy = btnCY - popCY;
    var startScale = Math.min(btnRect.width / popRect.width, 0.12);

    // Jump to start state (at the button, tiny)
    shapeTypePopup.style.transform = "translate(calc(-50% + " + dx + "px), calc(-50% + " + dy + "px)) scale(" + startScale + ")";
    shapeTypePopup.style.opacity = "0.2";
    shapeTypePopup.getBoundingClientRect(); // force reflow

    // Animate to final centred position
    requestAnimationFrame(function () {
      shapeTypePopup.style.transition = "transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease";
      shapeTypePopup.style.transform = "translate(-50%, -50%) scale(1)";
      shapeTypePopup.style.opacity = "1";
      function cleanup() {
        shapeTypePopup.style.transition = "";
        shapeTypePopup.removeEventListener("transitionend", cleanup);
      }
      shapeTypePopup.addEventListener("transitionend", cleanup);
    });
  });

  function closeShapeTypePopup() {
    shapeTypePopup.classList.add("hidden");
    shapeTypePopup.style.transition = "";
    shapeTypePopup.style.transform = "";
    shapeTypePopup.style.opacity = "";
    hidePopupScrimIfBothClosed();

  function uid() {

  function loadState() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) state = JSON.parse(raw);

      console.warn("Could not load saved canvas", e);
    }
    if (!state.connections) state.connections = [];
    if (!state.cards) state.cards = [];
    if (!state.images) state.images = [];
    if (!state.videos) state.videos = [];
    if (!state.shapes) state.shapes = [];
    if (!state.containers) state.containers = [];
    if (!state.cardGroups) state.cardGroups = [];
    if (!state.canvasColor) state.canvasColor = "warm-mid";
    if (typeof state.boardTitle !== "string") state.boardTitle = "";
    if (!state.boardSize) state.boardSize = { width: 2600, height: 1800 };

      if (!g.properties) g.properties = [];
    });
    state.cards.forEach(function (c) { if (!c.properties) c.properties = {}; });
    var z = 0;
    state.cards.forEach(function (c) { if (typeof c.z !== "number") c.z = z++; });
    state.images.forEach(function (im) { if (typeof im.z !== "number") im.z = z++; });
    state.shapes.forEach(function (s) { if (typeof s.z !== "number") s.z = z++; if (!s.type) s.type = "rectangle"; if (typeof s.rotation !== "number") s.rotation = 0; });
    state.containers.forEach(function (c) { if (!c.color) c.color = "neutral"; });
  }

  function getCardGroup(cardId) {
    return state.cardGroups.filter(function (s) { return s.cardIds.indexOf(cardId) !== -1; })[0] || null;
  }

  function getAllItemsByZ() {
    var stackedIds = {};
    state.cardGroups.forEach(function (s) { s.cardIds.forEach(function (id) { stackedIds[id] = true; }); });
    var all = state.cards.filter(function (c) { return !stackedIds[c.id]; }).map(function (c) { return { ref: c, type: "card" }; })
      .concat(state.images.map(function (im) { return { ref: im, type: "image" }; }))
      .concat((state.videos || []).map(function (v) { return { ref: v, type: "video" }; }))
      .concat(state.shapes.map(function (s) { return { ref: s, type: "shape" }; }))
      .concat(state.cardGroups.map(function (g) { return { ref: g, type: "group" }; }));
    all.sort(function (a, b) { return (a.ref.z || 0) - (b.ref.z || 0); });
    return all;
  }

  function getMaxZ() {
    var max = -1;
    state.cards.concat(state.images).concat(state.videos || []).concat(state.shapes).concat(state.cardGroups).forEach(function (item) {
      if (typeof item.z === "number" && item.z > max) max = item.z;

  function changeStackOrder(item, action) {
    var list = getAllItemsByZ();
    var idx = list.findIndex(function (entry) { return entry.ref === item; });
    if (idx === -1) return;
    var entry = list[idx];
    list.splice(idx, 1);
    if (action === "front") list.push(entry);
    else if (action === "back") list.unshift(entry);
    else if (action === "forward") list.splice(Math.min(idx + 1, list.length), 0, entry);
    else if (action === "backward") list.splice(Math.max(idx - 1, 0), 0, entry);
    list.forEach(function (e, i) { e.ref.z = i; });
    saveState();
    refreshCanvas();
  }

  boardResizeHandle.addEventListener("pointerdown", function (e) {

    function move(ev) {
      var dx = (ev.clientX - startX) / scale;
      var dy = (ev.clientY - startY) / scale;
      state.boardSize.width = Math.max(400, startW + dx);
      state.boardSize.height = Math.max(300, startH + dy);
      applyBoardSize();
    }

    function up(ev) {
      boardResizeHandle.removeEventListener("pointermove", move);
      boardResizeHandle.removeEventListener("pointerup", up);
      boardResizeHandle.releasePointerCapture(ev.pointerId);
      saveState();
    }

    boardResizeHandle.addEventListener("pointermove", move);

  boardResizeHandle.addEventListener("click", function (e) { e.stopPropagation(); });

  function zoomToFit() {
    var minX = Math.min(0, 0), minY = Math.min(0, 0), maxX = state.boardSize.width, maxY = state.boardSize.height;
    var found = true;

    state.cards.forEach(function (c) {
      if (getCardGroup(c.id)) return;
      minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
      maxX = Math.max(maxX, c.x + (c.width || 170)); maxY = Math.max(maxY, c.y + (c.height || 120));
      found = true;
    });
    state.images.forEach(function (im) {
      minX = Math.min(minX, im.x); minY = Math.min(minY, im.y);
      maxX = Math.max(maxX, im.x + im.width); maxY = Math.max(maxY, im.y + im.height);
      found = true;
    });
    state.cardGroups.forEach(function (g) {
      var dims = g.viewMode === "table" ? computeTableLayout(g) : computeGroupLayout(g);
      minX = Math.min(minX, g.x); minY = Math.min(minY, g.y);
      maxX = Math.max(maxX, g.x + dims.frameWidth);
      maxY = Math.max(maxY, g.y + (g.collapsed ? GROUP_HEADER_HEIGHT : dims.frameHeight));
      found = true;
    });
    state.shapes.forEach(function (s) {
      minX = Math.min(minX, s.x); minY = Math.min(minY, s.y);
      maxX = Math.max(maxX, s.x + s.width); maxY = Math.max(maxY, s.y + s.height);
      found = true;
    });
    state.containers.forEach(function (c) {
      minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
      maxX = Math.max(maxX, c.x + c.width); maxY = Math.max(maxY, c.y + c.height);
      found = true;
    });

    if (!found) return;

    var padding = 80;
    var contentW = Math.max(1, maxX - minX + padding * 2);
    var contentH = Math.max(1, maxY - minY + padding * 2);
    var rect = wrap.getBoundingClientRect();
    var scaleX = rect.width / contentW;
    var scaleY = rect.height / contentH;
    var targetScale = Math.max(0.15, Math.min(2, Math.min(scaleX, scaleY)));
    var centerX = (minX + maxX) / 2;
    var centerY = (minY + maxY) / 2;
    var targetPanX = rect.width / 2 - centerX * targetScale;
    var targetPanY = rect.height / 2 - centerY * targetScale;

    var startPanX = panX, startPanY = panY, startScale = scale;
    var duration = 420;
    var startTime = null;

    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function step(ts) {
      if (!startTime) startTime = ts;
      var t = Math.min(1, (ts - startTime) / duration);
      var e = ease(t);
      panX = startPanX + (targetPanX - startPanX) * e;
      panY = startPanY + (targetPanY - startPanY) * e;
      scale = startScale + (targetScale - startScale) * e;
      updateCanvasTransform();
      if (t < 1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
  }

  // ---- Marquee selection (click-drag on empty canvas) ----
  var isSelecting = false;
  var selectStart = null;

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function liveHighlightSelection(x, y, w, h) {
    document.querySelectorAll(".card, .img-item, .shape-item").forEach(function (el) {
      var id = el.dataset.id;
      if (el.classList.contains("card") && getCardGroup(id)) {
        el.classList.remove("selected");
        return;
      }
      var item = el.classList.contains("card")
        ? state.cards.filter(function (c) { return c.id === id; })[0]
        : el.classList.contains("img-item")
          ? state.images.filter(function (im) { return im.id === id; })[0]
          : state.shapes.filter(function (s) { return s.id === id; })[0];
      if (!item) return;
      el.classList.toggle("selected", rectsOverlap(x, y, w, h, item.x, item.y, item.width, item.height));
    });
    document.querySelectorAll(".card-group-frame").forEach(function (el) {
      var id = el.dataset.id;
      var group = state.cardGroups.filter(function (g) { return g.id === id; })[0];
      if (!group) return;
      var dims = group.viewMode === "table" ? computeTableLayout(group) : computeGroupLayout(group);
      var groupHeight = group.collapsed ? GROUP_HEADER_HEIGHT : dims.frameHeight;
      el.classList.toggle("selected", rectsOverlap(x, y, w, h, group.x, group.y, dims.frameWidth, groupHeight));
    });
  }

  function clearSelection() {
    selectedCardIds.clear();
    selectedImageIds.clear();

  // ---- Copy / paste ----
  var clipboardData = null;

  function copySelection() {
    if (selectedCardIds.size + selectedImageIds.size + selectedShapeIds.size + selectedGroupIds.size === 0) return false;

    var cards = state.cards.filter(function (c) { return selectedCardIds.has(c.id); }).map(function (c) { return JSON.parse(JSON.stringify(c)); });
    var images = state.images.filter(function (im) { return selectedImageIds.has(im.id); }).map(function (im) { return JSON.parse(JSON.stringify(im)); });
    var shapes = state.shapes.filter(function (s) { return selectedShapeIds.has(s.id); }).map(function (s) { return JSON.parse(JSON.stringify(s)); });
    var groups = [];
    var groupCards = [];
    selectedGroupIds.forEach(function (gid) {
      var g = state.cardGroups.filter(function (gr) { return gr.id === gid; })[0];
      if (!g) return;
      groups.push(JSON.parse(JSON.stringify(g)));
      g.cardIds.forEach(function (cid) {
        var c = state.cards.filter(function (cc) { return cc.id === cid; })[0];
        if (c) groupCards.push(JSON.parse(JSON.stringify(c)));
      });
    });

    var copiedCardIds = {};
    cards.forEach(function (c) { copiedCardIds[c.id] = true; });
    groupCards.forEach(function (c) { copiedCardIds[c.id] = true; });
    var connections = state.connections.filter(function (conn) {
      return copiedCardIds[conn.from] && copiedCardIds[conn.to];
    }).map(function (c) { return JSON.parse(JSON.stringify(c)); });

    clipboardData = { cards: cards, images: images, shapes: shapes, groups: groups, groupCards: groupCards, connections: connections };
    return true;
  }

  function pasteClipboard() {
    if (!clipboardData) return false;
    var offset = 28;
    var idMap = {};

    clearSelection();

    clipboardData.cards.forEach(function (c) {
      var newCard = JSON.parse(JSON.stringify(c));
      var oldId = newCard.id;
      newCard.id = uid();
      newCard.x += offset;
      newCard.y += offset;
      newCard.z = getMaxZ() + 1;
      idMap[oldId] = newCard.id;
      state.cards.push(newCard);
      selectedCardIds.add(newCard.id);
    });

    clipboardData.images.forEach(function (im) {
      var newImg = JSON.parse(JSON.stringify(im));
      newImg.id = uid();
      newImg.x += offset;
      newImg.y += offset;
      newImg.z = getMaxZ() + 1;
      state.images.push(newImg);
      selectedImageIds.add(newImg.id);
    });

    clipboardData.shapes.forEach(function (s) {
      var newShape = JSON.parse(JSON.stringify(s));
      newShape.id = uid();
      newShape.x += offset;
      newShape.y += offset;
      newShape.z = getMaxZ() + 1;
      state.shapes.push(newShape);
      selectedShapeIds.add(newShape.id);
    });

    clipboardData.groups.forEach(function (g) {
      var newGroup = JSON.parse(JSON.stringify(g));
      newGroup.id = uid();
      newGroup.x += offset;
      newGroup.y += offset;
      newGroup.z = getMaxZ() + 1;
      newGroup.cardIds = g.cardIds.map(function (oldCardId) {
        var originalCard = clipboardData.groupCards.filter(function (c) { return c.id === oldCardId; })[0];
        if (!originalCard) return null;
        var newCard = JSON.parse(JSON.stringify(originalCard));
        newCard.id = uid();
        idMap[oldCardId] = newCard.id;
        state.cards.push(newCard);
        return newCard.id;
      }).filter(Boolean);
      state.cardGroups.push(newGroup);
      selectedGroupIds.add(newGroup.id);
    });

    clipboardData.connections.forEach(function (conn) {
      var newFrom = idMap[conn.from];
      var newTo = idMap[conn.to];
      if (newFrom && newTo) {
        state.connections.push({ id: uid(), from: newFrom, to: newTo, color: conn.color, style: conn.style });
      }
    });

    saveState();
    refreshCanvas();
    return true;
  }

  document.addEventListener("keydown", function (e) {
