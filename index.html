      document.querySelectorAll(".img-item.selected").forEach(function (el) { selectedImageIds.add(el.dataset.id); });
      document.querySelectorAll(".shape-item.selected").forEach(function (el) { selectedShapeIds.add(el.dataset.id); });
      document.querySelectorAll(".card-group-frame.selected").forEach(function (el) { selectedGroupIds.add(el.dataset.id); });
      if (selectedCardIds.size >= 2) {
        showGroupSuggestChip(e.clientX, e.clientY);
      } else {
        hideGroupSuggestChip();
      }
    }
  });

  // ---- Two-finger scroll pans, pinch (or ctrl/cmd + scroll) zooms ----
  wrap.addEventListener("wheel", function (e) {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      var rect = wrap.getBoundingClientRect();
      var cx = e.clientX - rect.left;
      var cy = e.clientY - rect.top;
      var delta = -e.deltaY * 0.012;
      var newScale = Math.min(2.2, Math.max(0.45, scale + delta));
      var ratio = newScale / scale;
      panX = cx - (cx - panX) * ratio;
      panY = cy - (cy - panY) * ratio;
      scale = newScale;
    } else {
      panX -= e.deltaX;
      panY -= e.deltaY;
    }
    updateCanvasTransform();
  }, { passive: false });

  function moveOtherSelectedItems(dx, dy, excludeType, excludeId) {
    if (selectedCardIds.size + selectedImageIds.size + selectedShapeIds.size + selectedGroupIds.size <= 1) return;
    state.cards.forEach(function (c) {
      if (excludeType === "card" && c.id === excludeId) return;
      if (!selectedCardIds.has(c.id)) return;
      c.x += dx;
      c.y += dy;
      var el = itemsLayer.querySelector('.card[data-id="' + c.id + '"]');
      if (el) { el.style.transition = "none"; el.style.left = c.x + "px"; el.style.top = c.y + "px"; }
    });
    state.images.forEach(function (im) {
      if (excludeType === "image" && im.id === excludeId) return;
      if (!selectedImageIds.has(im.id)) return;
      im.x += dx;
      im.y += dy;
      var el = itemsLayer.querySelector('.img-item[data-id="' + im.id + '"]');
      if (el) { el.style.transition = "none"; el.style.left = im.x + "px"; el.style.top = im.y + "px"; }
    });
    state.shapes.forEach(function (s) {
      if (excludeType === "shape" && s.id === excludeId) return;
      if (!selectedShapeIds.has(s.id)) return;
      s.x += dx;
      s.y += dy;
      var el = itemsLayer.querySelector('.shape-item[data-id="' + s.id + '"]');
      if (el) { el.style.transition = "none"; el.style.left = s.x + "px"; el.style.top = s.y + "px"; }
    });
    state.cardGroups.forEach(function (g) {
      if (excludeType === "group" && g.id === excludeId) return;
      if (!selectedGroupIds.has(g.id)) return;
      g.x += dx;
      g.y += dy;
      var frameEl = itemsLayer.querySelector('.card-group-frame[data-id="' + g.id + '"]');
      if (frameEl) { frameEl.style.transition = "none"; frameEl.style.left = g.x + "px"; frameEl.style.top = g.y + "px"; }
      if (g.viewMode === "table") {
        var tableEl = itemsLayer.querySelector('.card-group-table[data-id="' + g.id + '"]');
        if (tableEl) {
          tableEl.style.transition = "none";
          tableEl.style.left = g.x + "px";
          tableEl.style.top = (g.y + GROUP_HEADER_HEIGHT) + "px";
        }
      } else if (!g.collapsed) {
        var groupLayout = computeGroupLayout(g);
        groupLayout.rows.forEach(function (row) {
          var cardEl = itemsLayer.querySelector('.card[data-id="' + row.card.id + '"]');
          if (cardEl) { cardEl.style.transition = "none"; cardEl.style.left = row.x + "px"; cardEl.style.top = row.y + "px"; }
        });
      }
    });
  }

  // ---- Dragging helper (shared by cards and images) ----
  function positionNearPoint(el, clientX, clientY) {
    el.style.left = clientX + "px";
    el.style.top = clientY + "px";
    var rect = el.getBoundingClientRect();
    var margin = 8;
    var newLeft = clientX;
    var newTop = clientY;
    if (rect.right > window.innerWidth - margin) newLeft -= (rect.right - (window.innerWidth - margin));
    if (rect.bottom > window.innerHeight - margin) newTop -= (rect.bottom - (window.innerHeight - margin));
    if (newLeft < margin) newLeft = margin;
    if (newTop < margin) newTop = margin;
    el.style.left = newLeft + "px";
    el.style.top = newTop + "px";
  }

  function clearAllTransitionOverrides() {
    document.querySelectorAll(".card, .img-item, .shape-item, .card-group-frame, .card-group-table").forEach(function (el) {
      el.style.transition = "";
    });
  }

  // Stack drop chip state
  var stackDropChip = document.getElementById("stack-drop-chip");
  var stackDropLabel = document.getElementById("stack-drop-label");
  var pendingStackDrop = null; // { cardId, groupId }

  function clearStackDropTarget() {
    document.querySelectorAll(".card-group-frame.stack-drop-target").forEach(function (el) {
      el.classList.remove("stack-drop-target");
    });
  }

  function hideStackDropChip() {
    stackDropChip.classList.remove("visible");
    clearStackDropTarget();
    pendingStackDrop = null;
  }

  document.getElementById("stack-drop-yes").addEventListener("click", function () {
    if (!pendingStackDrop) return;
    var group = state.cardGroups.filter(function (g) { return g.id === pendingStackDrop.groupId; })[0];
    if (group && group.cardIds.indexOf(pendingStackDrop.cardId) === -1) {
      // FLIP: snapshot existing card positions before adding
      var beforePositions = {};
      group.cardIds.forEach(function (id) {
        var el2 = itemsLayer.querySelector('.card[data-id="' + id + '"]');
        if (el2) beforePositions[id] = { top: parseFloat(el2.style.top) };
      });

      group.cardIds.push(pendingStackDrop.cardId);
      saveState();
      refreshCanvas();

      // FLIP: animate existing cards to their new positions
      setTimeout(function () {
        Object.keys(beforePositions).forEach(function (id) {
          var el2 = itemsLayer.querySelector('.card[data-id="' + id + '"]');
          if (!el2) return;
          var newTop = parseFloat(el2.style.top);
          var oldTop = beforePositions[id].top;
          if (Math.abs(newTop - oldTop) < 1) return;
          el2.style.transition = "none";
          el2.style.top = oldTop + "px";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              el2.style.transition = "";
              el2.style.top = newTop + "px";
            });
          });
        });

        // Pulse frame and pop in new card
        var frameEl = itemsLayer.querySelector('.card-group-frame[data-id="' + group.id + '"]');
        if (frameEl) {
          frameEl.classList.add("stack-just-received");
          frameEl.addEventListener("animationend", function () { frameEl.classList.remove("stack-just-received"); }, { once: true });
        }
        var cardEl = itemsLayer.querySelector('.card[data-id="' + pendingStackDrop.cardId + '"]');
        if (cardEl) {
          cardEl.classList.add("just-joined-stack");
          cardEl.addEventListener("animationend", function () { cardEl.classList.remove("just-joined-stack"); }, { once: true });
        }
      }, 16);
    }
    hideStackDropChip();
  });

  document.getElementById("stack-drop-no").addEventListener("click", hideStackDropChip);

  function getStackFrameAtCanvasPoint(cx, cy, excludeCardId) {
    // Find a stack frame whose canvas bounds contain this point
    // excludeCardId: don't match the group the dragged card already belongs to
    var found = null;
    state.cardGroups.forEach(function (g) {
      if (g.cardIds.indexOf(excludeCardId) !== -1) return; // already in this group
      // Compute frame bounds from group layout
      var cards = g.cardIds.map(function (id) {
        return state.cards.filter(function (c) { return c.id === id; })[0];
      }).filter(Boolean);
      if (!cards.length) return;
      var GROUP_PADDING = 8;
      var GROUP_HEADER_HEIGHT = 40;
      var minX = Math.min.apply(null, cards.map(function (c) { return c.x; })) - GROUP_PADDING;
      var minY = g.y !== undefined ? g.y : (Math.min.apply(null, cards.map(function (c) { return c.y; })) - GROUP_HEADER_HEIGHT - GROUP_PADDING);
      var maxX = Math.max.apply(null, cards.map(function (c) { return c.x + c.width; })) + GROUP_PADDING;
      var maxY = Math.max.apply(null, cards.map(function (c) { return c.y + c.height; })) + GROUP_PADDING;
      if (cx >= minX && cx <= maxX && cy >= minY && cy <= maxY) {
        found = g;
      }
    });
    return found;
  }

  function makeDraggable(el, onMove, dragCard) {
    el.addEventListener("pointerdown", function (e) {
      // For cards, only drag from header — let body clicks through
      if (dragCard && e.target.closest(".card-body")) return;
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      el.style.transition = "none";
      var startX = e.clientX, startY = e.clientY;
      var startLeft = parseFloat(el.style.left) || 0;
      var startTop = parseFloat(el.style.top) || 0;
      var moved = false;

      function move(ev) {
        var dx = (ev.clientX - startX) / scale;
        var dy = (ev.clientY - startY) / scale;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
          if (!moved) el.classList.add("is-dragging");
          moved = true;
        }
        var newLeft = startLeft + dx;
        var newTop = startTop + dy;
        el.style.left = newLeft + "px";
        el.style.top = newTop + "px";
        if (onMove) onMove(newLeft, newTop);

        // Stack drop target highlight
        if (dragCard && moved) {
          hideStackDropChip();
          var cx = newLeft + (dragCard.width || 160) / 2;
          var cy = newTop + (dragCard.height || 80) / 2;
          var hoveredGroup = getStackFrameAtCanvasPoint(cx, cy, dragCard.id);
          if (hoveredGroup) {
            var frameEl = itemsLayer.querySelector('.card-group-frame[data-id="' + hoveredGroup.id + '"]');
            if (frameEl) frameEl.classList.add("stack-drop-target");
            el._pendingGroup = hoveredGroup;
          } else {
            el._pendingGroup = null;
          }
        }
      }

      function up(ev) {
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
        el.releasePointerCapture(ev.pointerId);
        el.classList.remove("is-dragging");
        if (moved) {
          el.classList.add("just-landed");
          el.addEventListener("animationend", function () { el.classList.remove("just-landed"); }, { once: true });
        }
        saveState();
        el.dataset.justDragged = moved ? "1" : "0";
        clearAllTransitionOverrides();

        // Show stack drop chip if hovering a group
        if (dragCard && moved && el._pendingGroup) {
          var group = el._pendingGroup;
          el._pendingGroup = null;
          clearStackDropTarget();
          var groupTitle = group.title || "this stack";
          stackDropLabel.textContent = 'Add to "' + groupTitle + '"?';
          pendingStackDrop = { cardId: dragCard.id, groupId: group.id };
          var rect = el.getBoundingClientRect();
          stackDropChip.style.left = (rect.left + rect.width / 2) + "px";
          stackDropChip.style.top = (rect.top + rect.height / 2) + "px";
          stackDropChip.classList.add("visible");
        } else {
          el._pendingGroup = null;
        }
      }

      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
    });
  }

  // ---- Connectors ----
  function cardCenter(card) {
    return { x: card.x + card.width / 2, y: card.y + card.height / 2 };
  }

  function itemBounds(id) {
    // Returns { x, y, w, h, cx, cy } for any item
    var card = state.cards.filter(function (c) { return c.id === id; })[0];
    if (card) return { x: card.x, y: card.y, w: card.width, h: card.height, cx: card.x + card.width / 2, cy: card.y + card.height / 2 };
    var shape = (state.shapes || []).filter(function (s) { return s.id === id; })[0];
    if (shape) return { x: shape.x, y: shape.y, w: shape.width, h: shape.height, cx: shape.x + shape.width / 2, cy: shape.y + shape.height / 2 };
    var img = (state.images || []).filter(function (im) { return im.id === id; })[0];
    if (img) return { x: img.x, y: img.y, w: img.width, h: img.height, cx: img.x + img.width / 2, cy: img.y + img.height / 2 };
    var vid = (state.videos || []).filter(function (v) { return v.id === id; })[0];
    if (vid) return { x: vid.x, y: vid.y, w: vid.width, h: vid.height, cx: vid.x + vid.width / 2, cy: vid.y + vid.height / 2 };
    var group = (state.cardGroups || []).filter(function (g) { return g.id === id; })[0];
    if (group) {
      var layout = computeGroupLayout(group);
      return { x: group.x, y: group.y, w: layout.frameWidth, h: layout.frameHeight, cx: group.x + layout.frameWidth / 2, cy: group.y + layout.frameHeight / 2 };
    }
    return null;
  }

  function itemCenter(id) {
    var b = itemBounds(id);
    return b ? { x: b.cx, y: b.cy } : null;
  }

  function edgePoint(bounds, targetX, targetY) {
    // Find where the line from bounds centre toward (targetX, targetY) exits the bounds rect
    var cx = bounds.cx, cy = bounds.cy;
    var dx = targetX - cx, dy = targetY - cy;
    if (dx === 0 && dy === 0) return { x: cx, y: cy };
    var hw = bounds.w / 2, hh = bounds.h / 2;
    var scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
    var scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
    var s = Math.min(scaleX, scaleY);
    return { x: cx + dx * s, y: cy + dy * s };
  }

  function connectionPoints(fromId, toId) {
    var fb = itemBounds(fromId);
    var tb = itemBounds(toId);
    if (!fb || !tb) return null;
    // For groups use edge points; for other items use centre
    var isGroupFrom = !!(state.cardGroups || []).filter(function (g) { return g.id === fromId; })[0];
    var isGroupTo   = !!(state.cardGroups || []).filter(function (g) { return g.id === toId; })[0];
    var a = isGroupFrom ? edgePoint(fb, tb.cx, tb.cy) : { x: fb.cx, y: fb.cy };
    var b = isGroupTo   ? edgePoint(tb, fb.cx, fb.cy) : { x: tb.cx, y: tb.cy };
    // If from-item is also a group, recalculate b toward a (not centre)
    if (isGroupFrom && isGroupTo) {
      a = edgePoint(fb, tb.cx, tb.cy);
      b = edgePoint(tb, fb.cx, fb.cy);
    }
    return { a: a, b: b };
  }

  function itemFromPoint(clientX, clientY, excludeId) {
    // Check what canvas item is at this screen point
    var el = document.elementFromPoint(clientX, clientY);
    if (!el) return null;
    var card = el.closest(".card");
    if (card && card.dataset.id !== excludeId) return card.dataset.id;
    var shape = el.closest(".shape-item");
    if (shape && shape.dataset.id !== excludeId) return shape.dataset.id;
    var img = el.closest(".img-item");
    if (img && img.dataset.id !== excludeId) return img.dataset.id;
    var frame = el.closest(".card-group-frame");
    if (frame && frame.dataset.id !== excludeId) return frame.dataset.id;
    return null;
  }

  function canvasPointFromEvent(e) {
    var rect = wrap.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left - panX) / scale,
      y: (e.clientY - rect.top - panY) / scale
    };
  }

  function startConnection(e, fromId, handleEl) {
    e.stopPropagation();
    handleEl.setPointerCapture(e.pointerId);
    var startPt = itemCenter(fromId);
    if (!startPt) return;

    var tempLine = document.createElementNS(SVG_NS, "line");
    tempLine.setAttribute("x1", startPt.x);
    tempLine.setAttribute("y1", startPt.y);
    tempLine.setAttribute("x2", startPt.x);
    tempLine.setAttribute("y2", startPt.y);
    tempLine.setAttribute("stroke", "#8A7D68");
    tempLine.setAttribute("stroke-width", "1.5");
    tempLine.setAttribute("stroke-dasharray", "4 4");
    connectorLayer.appendChild(tempLine);

    function move(ev) {
      var p = canvasPointFromEvent(ev);
      // Update start to edge point as target moves
      var fb = itemBounds(fromId);
      var start = fb ? edgePoint(fb, p.x, p.y) : startPt;
      tempLine.setAttribute("x1", start.x);
      tempLine.setAttribute("y1", start.y);
      tempLine.setAttribute("x2", p.x);
      tempLine.setAttribute("y2", p.y);
    }

    function up(ev) {
      handleEl.removeEventListener("pointermove", move);
      handleEl.removeEventListener("pointerup", up);
      handleEl.releasePointerCapture(ev.pointerId);
      connectorLayer.removeChild(tempLine);

      var toId = itemFromPoint(ev.clientX, ev.clientY, fromId);
      if (toId) {
        var alreadyExists = state.connections.some(function (c) {
          return (c.from === fromId && c.to === toId) || (c.from === toId && c.to === fromId);
        });
        if (!alreadyExists) {
          state.connections.push({ id: uid(), from: fromId, to: toId, color: "taupe", style: "solid" });
          saveState();
        }
      }
      renderConnections();
    }

    handleEl.addEventListener("pointermove", move);
    handleEl.addEventListener("pointerup", up);
  }

  function isCardConnectorHidden(id) {
    var card = state.cards.filter(function (c) { return c.id === id; })[0];
    if (!card) return false; // non-card items are never hidden
    var group = getCardGroup(id);
    if (!group) return false;
    if (group.collapsed) return true;
    var minSize = estimateMinCardSize(card);
    return card.height <= minSize.minH + 20;
  }

  function renderConnections() {
    connectorLinesGroup.innerHTML = "";
    state.connections.forEach(function (conn) {
      if (isCardConnectorHidden(conn.from) || isCardConnectorHidden(conn.to)) return;
      var pts = connectionPoints(conn.from, conn.to);
      if (!pts) return;
      var a = pts.a, b = pts.b;

      var hit = document.createElementNS(SVG_NS, "line");
      hit.setAttribute("x1", a.x);
      hit.setAttribute("y1", a.y);
      hit.setAttribute("x2", b.x);
      hit.setAttribute("y2", b.y);
      hit.setAttribute("stroke", "transparent");
      hit.setAttribute("stroke-width", "16");
      hit.style.pointerEvents = "stroke";
      hit.style.cursor = "pointer";
      hit.addEventListener("click", function (e) {
        e.stopPropagation();
        openConnectorPopup(conn, e.clientX, e.clientY);
      });

      var visible = document.createElementNS(SVG_NS, "line");
      visible.setAttribute("x1", a.x);
      visible.setAttribute("y1", a.y);
      visible.setAttribute("x2", b.x);
      visible.setAttribute("y2", b.y);
      visible.setAttribute("stroke", CONNECTOR_COLORS[conn.color] || CONNECTOR_COLORS.taupe);
      visible.setAttribute("stroke-width", "3");
      visible.setAttribute("stroke-linecap", "round");
      visible.setAttribute("stroke-dasharray", CONNECTOR_DASH[conn.style] || CONNECTOR_DASH.solid);
      visible.setAttribute("filter", "url(#line-shadow)");
      visible.style.pointerEvents = "none";

      connectorLinesGroup.appendChild(hit);
      connectorLinesGroup.appendChild(visible);
    });
  }

  function openConnectorPopup(conn, clientX, clientY) {
    closeStackMenu();
    closeCanvasColorPopup();
    closeGroupCreatePopup();
    activeConnectionId = conn.id;
    document.querySelectorAll(".conn-color-swatch").forEach(function (sw) {
      sw.classList.toggle("selected", sw.dataset.color === (conn.color || "taupe"));
    });
    document.querySelectorAll(".conn-style-btn").forEach(function (btn) {
      btn.classList.toggle("selected", btn.dataset.style === (conn.style || "solid"));
    });
    connectorPopup.classList.remove("hidden");
    positionNearPoint(connectorPopup, clientX, clientY);
  }

  function closeConnectorPopup() {
    connectorPopup.classList.add("hidden");
    activeConnectionId = null;
  }

  document.querySelectorAll(".conn-color-swatch").forEach(function (sw) {
    sw.addEventListener("click", function (e) {
      e.stopPropagation();
      var conn = state.connections.filter(function (c) { return c.id === activeConnectionId; })[0];
      if (conn) {
        conn.color = sw.dataset.color;
        saveState();
        renderConnections();
      }
      closeConnectorPopup();
    });
  });

  document.querySelectorAll(".conn-style-btn").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      var conn = state.connections.filter(function (c) { return c.id === activeConnectionId; })[0];
      if (conn) {
        conn.style = btn.dataset.style;
        saveState();
        renderConnections();
      }
      closeConnectorPopup();
    });
  });

  document.getElementById("connector-delete").addEventListener("click", function (e) {
    e.stopPropagation();
    state.connections = state.connections.filter(function (c) { return c.id !== activeConnectionId; });
    saveState();
    renderConnections();
    closeConnectorPopup();
  });

  // ---- Cards ----
  function estimateMinCardSize(card) {
    var title = card.title || "Untitled";
    var charWidth = 8.5;
    var titleTextWidth = title.length * charWidth;
    var safeZone = 20;
    var minW = Math.max(130, Math.ceil(titleTextWidth) + 24 + safeZone);
    var minH = 72;
    return { minW: minW, minH: minH };
  }

  var notesMeasureEl = document.createElement("div");
  notesMeasureEl.style.position = "absolute";
  notesMeasureEl.style.visibility = "hidden";
  notesMeasureEl.style.left = "-9999px";
  notesMeasureEl.style.top = "-9999px";
  notesMeasureEl.style.fontFamily = "Inter, sans-serif";
  notesMeasureEl.style.fontSize = "12px";
  notesMeasureEl.style.lineHeight = "1.5";
  notesMeasureEl.style.whiteSpace = "pre-wrap";
  notesMeasureEl.style.overflowWrap = "break-word";
  document.body.appendChild(notesMeasureEl);

  function measureNotesHeight(text, width) {
    notesMeasureEl.style.width = width + "px";
    notesMeasureEl.textContent = text || "";
    return notesMeasureEl.scrollHeight;
  }

  function minimizeCard(card) {
    var minSize = estimateMinCardSize(card);
    var group = getCardGroup(card.id);
    if (!group) card.width = minSize.minW;
    card.height = minSize.minH;
    saveState();
    var before = captureItemRects();
    refreshCanvas();
    playFlipAnimation(before);
  }

  function maximizeCard(card) {
    var minSize = estimateMinCardSize(card);
    var group = getCardGroup(card.id);
    var targetWidth;
    if (group) {
      group.cardIds.forEach(function (id) {
        if (id === card.id) return;
        var other = state.cards.filter(function (c) { return c.id === id; })[0];
        if (!other) return;
        var otherMin = estimateMinCardSize(other);
        if (other.height > otherMin.minH + 2) other.height = otherMin.minH;
      });
      var layout = computeGroupLayout(group);
      targetWidth = layout.rows.length ? layout.rows[0].width : card.width;
    } else {
      targetWidth = Math.max(card.width, minSize.minW, 220);
    }
    var contentWidth = targetWidth - 24;
    var notesHeight = measureNotesHeight(card.notes || "", contentWidth);
    if (!group) card.width = targetWidth;
    card.height = minSize.minH + notesHeight + 16;
    saveState();
    var before2 = captureItemRects();
    refreshCanvas();
    playFlipAnimation(before2);
  }

  function renderCard(card, override) {
    var minSize = estimateMinCardSize(card);
    card.width = Math.max(card.width || 170, minSize.minW);
    card.height = Math.max(card.height || 120, minSize.minH);

    var locked = !!override;
    var renderX = locked ? override.x : card.x;
    var renderY = locked ? override.y : card.y;
    var renderWidth = locked ? override.width : card.width;

    var el = document.createElement("div");
    el.className = "card cat-" + card.category + (selectedCardIds.has(card.id) ? " selected" : "");
    el.style.left = renderX + "px";
    el.style.top = renderY + "px";
    el.style.width = renderWidth + "px";
    el.style.height = card.height + "px";
    el.dataset.id = card.id;

    var header = document.createElement("div");
    header.className = "card-header";

    var title = document.createElement("p");
    title.className = "card-title";

    var body = document.createElement("div");

    var group = getCardGroup(card.id);
    if (group && group.properties && group.properties.length && card.properties) {
      var badgesRow = document.createElement("div");
      badgesRow.className = "card-property-badges";

        if (prop.type === "select") {

          var textEl = document.createElement("div");
          textEl.className = "card-song-pill-text";

            artistEl.className = "card-song-pill-artist";
            artistEl.textContent = block.songArtist;
            textEl.appendChild(artistEl);

          preview.appendChild(pill);

      });
    } else {

        var headingMatch = line.match(/^##\s+(.*)/);
        var lineEl = document.createElement("div");
        if (headingMatch) {
          lineEl.className = "card-preview-heading";
          lineEl.textContent = headingMatch[1];

          lineEl.className = "card-preview-line";
          lineEl.textContent = line;
        }
        preview.appendChild(lineEl);
      });

    preview.style.display = (card.height > minSize.minH + 20) ? "" : "none";
    body.appendChild(preview);

    if (card.images && card.images.length) {
      var thumbRow = document.createElement("div");
      thumbRow.className = "card-thumb-row";
      card.images.slice(0, 3).forEach(function (imgObj) {

    el.appendChild(body);

    var resizeHandle = document.createElement("div");
    resizeHandle.className = "resize-handle";
    resizeHandle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

    itemsLayer.appendChild(el);

    if (!locked) {
      // Header click — select/deselect
      header.addEventListener("click", function (e) {
        if (el.dataset.justDragged === "1") return;
        e.stopPropagation();
        if (selectedCardIds.has(card.id)) {
          selectedCardIds.delete(card.id);
          el.classList.remove("selected");
        } else {
          clearSelection();
          selectedCardIds.add(card.id);
          el.classList.add("selected");

      });

      // Body click — open card editor
      body.addEventListener("click", function (e) {
        if (el.dataset.justDragged === "1") return;

      // Pointerdown selects; drag only initiates from header
      el.addEventListener("pointerdown", function (e) {

          clearSelection();
          selectedCardIds.add(card.id);

      makeDraggable(el, function (x, y) {

    if (locked) {
      header.addEventListener("click", function () {
        if (el.dataset.justDragged === "1") return;

      body.addEventListener("click", function (e) {
        e.stopPropagation();
        if (el.dataset.justDragged === "1") return;
        var minSize = estimateMinCardSize(card);
        var atMinimum = card.height <= minSize.minH + 2;
        if (atMinimum) maximizeCard(card);

      // Drag out of stack
      el.addEventListener("pointerdown", function (e) {
        if (e.target.closest(".card-header") === null && e.target.closest(".card-body") === null) return;
        var startX = e.clientX, startY = e.clientY;
        var moved = false;
        var ejected = false;

        function move(ev) {
          var dx = (ev.clientX - startX) / scale;
          var dy = (ev.clientY - startY) / scale;
          if (!ejected && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
            ejected = true;
            moved = true;
            // Remove from group
            var group = getCardGroup(card.id);
            if (group) {
              // FLIP: snapshot positions of remaining cards before removal
              var beforePositions = {};
              group.cardIds.forEach(function (id) {
                if (id === card.id) return;
                var el2 = itemsLayer.querySelector('.card[data-id="' + id + '"]');
                if (el2) beforePositions[id] = { top: parseFloat(el2.style.top) };
              });

              group.cardIds = group.cardIds.filter(function (id) { return id !== card.id; });
              if (group.cardIds.length === 0) {
                state.cardGroups = state.cardGroups.filter(function (g) { return g.id !== group.id; });
              }

              // Place card at current canvas position before refresh
              var rect2 = wrap.getBoundingClientRect();
              card.x = (ev.clientX - rect2.left - panX) / scale - card.width / 2;
              card.y = (ev.clientY - rect2.top - panY) / scale - 20;
              saveState();
              refreshCanvas();

              // FLIP: for each remaining card, jump to old position then transition to new
              Object.keys(beforePositions).forEach(function (id) {
                var el2 = itemsLayer.querySelector('.card[data-id="' + id + '"]');
                if (!el2) return;
                var newTop = parseFloat(el2.style.top);
                var oldTop = beforePositions[id].top;
                if (Math.abs(newTop - oldTop) < 1) return;
                el2.style.transition = "none";
                el2.style.top = oldTop + "px";
                requestAnimationFrame(function () {
                  requestAnimationFrame(function () {
                    el2.style.transition = "";
                    el2.style.top = newTop + "px";
                  });
                });
              });
            } else {
              var rect2 = wrap.getBoundingClientRect();
              card.x = (ev.clientX - rect2.left - panX) / scale - card.width / 2;
              card.y = (ev.clientY - rect2.top - panY) / scale - 20;
              saveState();
              refreshCanvas();
            }
            // Hand off to the newly rendered free card element
            var newEl = itemsLayer.querySelector('.card[data-id="' + card.id + '"]');
            if (newEl) {
              newEl.classList.add("is-dragging");
              newEl.setPointerCapture(e.pointerId);
              var newStartX = ev.clientX, newStartY = ev.clientY;
              var newStartLeft = card.x, newStartTop = card.y;
              function newMove(ev2) {
                var dx2 = (ev2.clientX - newStartX) / scale;
                var dy2 = (ev2.clientY - newStartY) / scale;
                card.x = newStartLeft + dx2;
                card.y = newStartTop + dy2;
                newEl.style.left = card.x + "px";
                newEl.style.top = card.y + "px";
                renderConnections();
                var hoveredGroup = getStackFrameAtCanvasPoint(card.x + card.width / 2, card.y + card.height / 2, card.id);
                clearStackDropTarget();
                if (hoveredGroup) {
                  var frameEl = itemsLayer.querySelector('.card-group-frame[data-id="' + hoveredGroup.id + '"]');
                  if (frameEl) frameEl.classList.add("stack-drop-target");
                  newEl._pendingGroup = hoveredGroup;
                } else {
                  newEl._pendingGroup = null;
                }
              }
              function newUp(ev2) {
                newEl.removeEventListener("pointermove", newMove);
                newEl.removeEventListener("pointerup", newUp);
                newEl.classList.remove("is-dragging");
                newEl.classList.add("just-landed");
                newEl.addEventListener("animationend", function () { newEl.classList.remove("just-landed"); }, { once: true });
                saveState();
                newEl.dataset.justDragged = "1";
                clearAllTransitionOverrides();
                if (newEl._pendingGroup) {
                  var g = newEl._pendingGroup;
                  newEl._pendingGroup = null;
                  clearStackDropTarget();
                  stackDropLabel.textContent = 'Add to "' + (g.title || "this stack") + '"?';
                  pendingStackDrop = { cardId: card.id, groupId: g.id };
                  var r = newEl.getBoundingClientRect();
                  stackDropChip.style.left = (r.left + r.width / 2) + "px";
                  stackDropChip.style.top = (r.top + r.height / 2) + "px";
                  stackDropChip.classList.add("visible");
                }
              }
              newEl.addEventListener("pointermove", newMove);
              newEl.addEventListener("pointerup", newUp);
            }
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", up);
          }
        }

        function up() {
          document.removeEventListener("pointermove", move);
          document.removeEventListener("pointerup", up);
          el.dataset.justDragged = moved ? "1" : "0";
        }

        // Listen on document so we get events even if pointer leaves el
        document.addEventListener("pointermove", move);
        document.addEventListener("pointerup", up);
      });
    }

    resizeHandle.addEventListener("dblclick", function (e) {
      e.stopPropagation();
      var minSize = estimateMinCardSize(card);
      var cardGroup = getCardGroup(card.id);
      var atMinimum = cardGroup
        ? card.height <= minSize.minH + 2
        : (card.width <= minSize.minW + 2 && card.height <= minSize.minH + 2);
      if (atMinimum) maximizeCard(card);
      else minimizeCard(card);
    });

    if (!locked) {
      resizeHandle.addEventListener("pointerdown", function (e) {
        e.stopPropagation();
        resizeHandle.setPointerCapture(e.pointerId);
        el.style.transition = "none";
        var startX = e.clientX, startY = e.clientY;
        var startW = card.width, startH = card.height;
        var minSize = estimateMinCardSize(card);

        function move(ev) {
          var dx = (ev.clientX - startX) / scale;
          var dy = (ev.clientY - startY) / scale;
          var newW = Math.max(minSize.minW, startW + dx);
          var newH = Math.max(minSize.minH, startH + dy);
          card.width = newW;
          card.height = newH;
          el.style.width = newW + "px";
          el.style.height = newH + "px";
          preview.style.display = (newH > minSize.minH + 20) ? "" : "none";
          renderConnections();
        }

        function up(ev) {
          resizeHandle.removeEventListener("pointermove", move);
          resizeHandle.removeEventListener("pointerup", up);
          resizeHandle.releasePointerCapture(ev.pointerId);
          saveState();
          clearAllTransitionOverrides();
        }

        resizeHandle.addEventListener("pointermove", move);
        resizeHandle.addEventListener("pointerup", up);
      });
    }
    resizeHandle.addEventListener("click", function (e) { e.stopPropagation(); });

    if (connectHandle) {
      connectHandle.addEventListener("pointerdown", function (e) {
        startConnection(e, card.id, connectHandle);
      });
      connectHandle.addEventListener("click", function (e) { e.stopPropagation(); });
    }

    el.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openStackMenu(card, "card", e.clientX, e.clientY);
    });

    return el;
  }

  // ---- Images ----
  function renderImage(img) {
    var el = document.createElement("div");
    el.className = "img-item" + (selectedImageIds.has(img.id) ? " selected" : "");
    el.style.left = img.x + "px";
    el.style.top = img.y + "px";
    el.style.width = img.width + "px";
    el.style.height = img.height + "px";
    el.style.transform = "rotate(" + img.rotation + "deg)";
    el.dataset.id = img.id;

    var imageTag = document.createElement("img");
    imageTag.src = img.src;
    el.appendChild(imageTag);

    var handle = document.createElement("div");
    handle.className = "resize-handle";
    handle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
    el.appendChild(handle);

    itemsLayer.appendChild(el);

    el.addEventListener("pointerdown", function () {
      if (!selectedImageIds.has(img.id)) {
        clearSelection();
        selectedImageIds.add(img.id);
        el.classList.add("selected");
      }
    });

    makeDraggable(el, function (x, y) {
      var dx = x - img.x;
      var dy = y - img.y;
      img.x = x;
      img.y = y;
      moveOtherSelectedItems(dx, dy, "image", img.id);
      renderConnections();
    });

    handle.addEventListener("pointerdown", function (e) {
      e.stopPropagation();
      handle.setPointerCapture(e.pointerId);
      el.style.transition = "none";

      var rect = el.getBoundingClientRect();
      var center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      var startDist = Math.max(1, Math.hypot(e.clientX - center.x, e.clientY - center.y));
      var startAngleRaw = Math.atan2(e.clientY - center.y, e.clientX - center.x) * 180 / Math.PI;
      var startRotation = img.rotation;
      var startW = img.width, startH = img.height;
      var ratio = startW / startH;

      function move(ev) {
        var dist = Math.hypot(ev.clientX - center.x, ev.clientY - center.y);
        var scaleFactor = dist / startDist;
        var newW = Math.max(60, startW * scaleFactor);
        var newH = newW / ratio;
        img.width = newW;
        img.height = newH;
        el.style.width = newW + "px";
        el.style.height = newH + "px";

        var angleRaw = Math.atan2(ev.clientY - center.y, ev.clientX - center.x) * 180 / Math.PI;
        var rawRotation = startRotation + (angleRaw - startAngleRaw);
        var norm = ((rawRotation % 360) + 360) % 360;
        var nearest90 = Math.round(norm / 90) * 90 % 360;
        var diff = Math.min(Math.abs(norm - nearest90), 360 - Math.abs(norm - nearest90));
        var rotation = (diff < 2.5) ? nearest90 : norm;
        img.rotation = Math.round(rotation * 10) / 10;
        el.style.transform = "rotate(" + img.rotation + "deg)";
      }

      function up(ev) {
        handle.removeEventListener("pointermove", move);
        handle.removeEventListener("pointerup", up);
        handle.releasePointerCapture(ev.pointerId);
        saveState();
        clearAllTransitionOverrides();
      }

      handle.addEventListener("pointermove", move);
      handle.addEventListener("pointerup", up);
    });

    el.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openStackMenu(img, "image", e.clientX, e.clientY);
    });

    var imgConnectHandle = document.createElement("div");
    imgConnectHandle.className = "connect-handle";
    el.appendChild(imgConnectHandle);
    imgConnectHandle.addEventListener("pointerdown", function (e) {
      startConnection(e, img.id, imgConnectHandle);
    });
    imgConnectHandle.addEventListener("click", function (e) { e.stopPropagation(); });

    return el;
  }

  var SHAPE_COLORS = {
    sand: "#DDD2BD",
    sage: "#C3D6BC",
    sky: "#C2D8EC",
    blush: "#EFCBCE",
    yellow: "#EDE0AE",
    "sand-bright": "#E0883A",
    "sage-bright": "#4FAF54",
    "sky-bright": "#3B82C4",
    "blush-bright": "#E0527A",
    "yellow-bright": "#E8B92E",
    "light-grey": "#D4D0CB",
    "mid-grey": "#9A9590",
    "charcoal": "#4A4540",
    "black": "#1A1714"
  };

  var CONTAINER_COLORS = {
    neutral: { swatch: "#C9C2B4", bg: "rgba(61,51,42,0.035)", border: "rgba(61,51,42,0.18)" },
    sand: { swatch: "#E0883A", bg: "rgba(224,136,58,0.10)", border: "rgba(224,136,58,0.38)" },
    sage: { swatch: "#4FAF54", bg: "rgba(79,175,84,0.10)", border: "rgba(79,175,84,0.38)" },
    sky: { swatch: "#3B82C4", bg: "rgba(59,130,196,0.10)", border: "rgba(59,130,196,0.38)" },
    blush: { swatch: "#E0527A", bg: "rgba(224,82,122,0.10)", border: "rgba(224,82,122,0.38)" },
    yellow: { swatch: "#E8B92E", bg: "rgba(232,185,46,0.13)", border: "rgba(232,185,46,0.42)" }
  };

  var SHAPE_CLIP_PATHS = {
    rectangle: "none",
    circle: "none",
    triangle: "polygon(50% 0%, 0% 100%, 100% 100%)",
    star: "polygon(50% 0%, 61.8% 38.2%, 100% 38.2%, 69.1% 61.8%, 80.9% 100%, 50% 76.4%, 19.1% 100%, 30.9% 61.8%, 0% 38.2%, 38.2% 38.2%)",
    arrow: "polygon(0% 30%, 55% 30%, 55% 0%, 100% 50%, 55% 100%, 55% 70%, 0% 70%)",
    chevron: "polygon(0% 0%, 70% 0%, 100% 50%, 70% 100%, 0% 100%, 30% 50%)"
  };

  function getDeformClipPath(shape) {
    var d = (shape.deform !== undefined) ? shape.deform : 0.5;
    d = Math.max(0.01, Math.min(0.99, d));
    var type = shape.type || "rectangle";
    switch (type) {
      case "triangle":
        // d controls apex X position (0=left, 0.5=centre, 1=right)
        return "polygon(" + Math.round(d * 100) + "% 0%, 0% 100%, 100% 100%)";
      case "arrow":
        // d controls shaft height (how thick the shaft is, 0.1–0.9)
        var sh = Math.round(d * 80 + 10); // 10%–90%
        var half = Math.round(sh / 2);
        var top = 50 - half; var bot = 50 + half;
        return "polygon(0% " + top + "%, 55% " + top + "%, 55% 0%, 100% 50%, 55% 100%, 55% " + bot + "%, 0% " + bot + "%)";
      case "chevron":
        // d controls how deep the indent is (0=flat, 1=very pointed)
        var depth = Math.round(d * 90);
        return "polygon(0% 0%, " + (100 - depth) + "% 0%, 100% 50%, " + (100 - depth) + "% 100%, 0% 100%, " + depth + "% 50%)";
      case "star":
        // d controls inner radius of star (0.1=spiky, 0.8=plump)
        var inner = Math.round(d * 70 + 10);
        var pts = [];
        for (var i = 0; i < 10; i++) {
          var angle = (i * 36 - 90) * Math.PI / 180;
          var r = (i % 2 === 0) ? 50 : inner / 2;
          pts.push(Math.round(50 + r * Math.cos(angle)) + "% " + Math.round(50 + r * Math.sin(angle)) + "%");
        }
        return "polygon(" + pts.join(", ") + ")";
      case "circle":
        // d controls x-radius squeeze (0.2=thin ellipse, 1=circle)
        return "none"; // border-radius handles circle; we use deform for squircle-ness below
      case "rectangle":
        return "none"; // border-radius handled separately
      default:
        return SHAPE_CLIP_PATHS[type] || "none";
    }
  }

  function getShapeSVGPath(type, deform) {
    var d = (deform !== undefined) ? Math.max(0.01, Math.min(0.99, deform)) : 0.5;
    switch (type) {
      case "triangle": {
        var apex = Math.round(d * 100);
        return "M " + apex + " 0 L 0 100 L 100 100 Z";
      }
      case "arrow": {
        var sh = Math.round(d * 80 + 10);
        var half = sh / 2;
        var top = 50 - half, bot = 50 + half;
        return "M 0 " + top + " L 55 " + top + " L 55 0 L 100 50 L 55 100 L 55 " + bot + " L 0 " + bot + " Z";
      }
      case "chevron": {
        var depth = Math.round(d * 90);
        return "M 0 0 L " + (100-depth) + " 0 L 100 50 L " + (100-depth) + " 100 L 0 100 L " + depth + " 50 Z";
      }
      case "star": {
        var inner = Math.round(d * 70 + 10);
        var pts = [];
        for (var i = 0; i < 10; i++) {
          var angle = (i * 36 - 90) * Math.PI / 180;
          var r = (i % 2 === 0) ? 50 : inner / 2;
          pts.push((50 + r * Math.cos(angle)).toFixed(1) + "," + (50 + r * Math.sin(angle)).toFixed(1));
        }
        return "M " + pts.join(" L ") + " Z";
      }
      default: return null;
    }
  }

  function applyShapeStyle(fillEl, shape) {
    var type = (typeof shape === "string") ? shape : (shape.type || "rectangle");
    var d = (shape && shape.deform !== undefined) ? shape.deform : 0.5;
    var fillStyle = (shape && shape.fillStyle) ? shape.fillStyle : "solid";
    var color = (shape && shape.color) ? (SHAPE_COLORS[shape.color] || SHAPE_COLORS.sand) : SHAPE_COLORS.sand;

    // Remove any existing SVG outline overlay
    var parent = fillEl.parentNode;
    if (parent) {
      var old = parent.querySelector(".shape-svg-outline");
      if (old) parent.removeChild(old);
    }

    // Border radius / clip path
    if (type === "rectangle") {
      var radius = Math.round(d * 50);
      fillEl.style.borderRadius = radius + "px";
      fillEl.style.clipPath = "none";
    } else if (type === "circle") {
      var rx = Math.round(Math.max(10, d * 100));
      fillEl.style.borderRadius = rx + "% / 50%";
      fillEl.style.clipPath = "none";
    } else {
      fillEl.style.borderRadius = "0";
      fillEl.style.clipPath = getDeformClipPath(typeof shape === "string" ? { type: shape } : shape);
    }

    var isClipped = fillEl.style.clipPath && fillEl.style.clipPath !== "none";

    if (fillStyle === "solid") {
      fillEl.style.background = color;
      fillEl.style.border = "none";
      fillEl.style.outline = "none";
    } else {
      fillEl.style.background = "transparent";

      var rect = el.getBoundingClientRect();
      var center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      var startDist = Math.max(1, Math.hypot(e.clientX - center.x, e.clientY - center.y));

  // ---- Block system ----
  function migrateCardToBlocks(card) {
    // Convert legacy notes string + images array into blocks array
    if (card.blocks) return; // already migrated
    card.blocks = [];
    if (card.notes && card.notes.trim()) {
      card.blocks.push({ id: uid(), type: "text", content: card.notes });
    }
    if (card.images && card.images.length) {
      card.blocks.push({ id: uid(), type: "image", images: card.images.slice() });

  function saveBlocksToCard(card) {

    var textParts = [];

      if (b.type === "text") textParts.push(b.content || "");
      if (b.type === "image") card.images = card.images.concat(b.images || []);

  // ---- Song parsing / serialising ----
  // Storage format: array of verse objects
  // verse: { label: string|null, pairs: [{chords: [{text, offset}], lyric: string}] }
  // Raw markup format: [Chord]lyric text  (Ultimate Guitar style)

  function parseUGRaw(raw) {
    // Handles two UG formats:
    // 1. Print format: chord-only line above lyric line  ("F         G\nOh Randy...")
    // 2. Inline format: [Chord] markers within lyric line ("[F]Oh [G]Randy...")
    // Also handles [Verse 1], [Chorus] section labels and blank-line verse breaks.

    var lines = raw.split("\n");
    var verses = [];
    var currentVerse = { label: null, pairs: [] };
    var pendingChordLine = null; // holds a chord-only line waiting for its lyric

    function isChordLine(line) {
      // A chord line contains only chord names and spaces — no general lowercase words
      var stripped = line.trim();
      if (!stripped) return false;
      // Must have at least one chord root (A-G)
      if (!/[A-G]/.test(stripped)) return false;
      // Split into tokens and check each one looks like a chord
      var tokens = stripped.split(/\s+/);
      if (!tokens.length) return false;
      var chordPattern = /^[A-G][#b]?(m|maj|min|sus|aug|dim|add|M)?[0-9]*(\/[A-G][#b]?)?$/;
      return tokens.every(function(t) { return t === "" || chordPattern.test(t); });
    }

    function parseChordPositions(chordLine) {
      var chords = [];
      var re = /([A-G][#b]?(?:m|maj|min|sus|aug|dim|add|M)?[0-9]*(?:\/[A-G][#b]?)?)/g;
      var m;
      while ((m = re.exec(chordLine)) !== null) {
        chords.push({ text: m[1], offset: m.index });
      }
      return chords;
    }

    function pushVerse() {
      if (pendingChordLine !== null) {
        // Orphaned chord line with no lyric after it
        currentVerse.pairs.push({ chords: parseChordPositions(pendingChordLine), lyric: "" });
        pendingChordLine = null;
      }
      if (currentVerse.pairs.length) verses.push(currentVerse);
    }

    var i = 0;
    while (i < lines.length) {
      var line = lines[i];

      // Section label: [Verse 1], [Chorus], [Bridge] etc.
      if (/^\[[^\]]+\]\s*$/.test(line) && !/^\[[A-G][#b]?[^\]]*\]\s*$/.test(line)) {
        pushVerse();
        currentVerse = { label: line.replace(/^\[|\]\s*$/g, "").trim(), pairs: [] };
        pendingChordLine = null;
        i++; continue;
      }

      // Blank line = verse break
      if (line.trim() === "") {
        if (pendingChordLine !== null || currentVerse.pairs.length) {
          pushVerse();
          currentVerse = { label: null, pairs: [] };
        }
        i++; continue;
      }

      // Inline [Chord] format
      if (/\[[A-G][^\]]*\]/.test(line)) {
        if (pendingChordLine !== null) {
          currentVerse.pairs.push({ chords: parseChordPositions(pendingChordLine), lyric: "" });
          pendingChordLine = null;
        }
        currentVerse.pairs.push(parseInlineLine(line));
        i++; continue;
      }

      // Chord-only line (print format)
      if (isChordLine(line)) {
        if (pendingChordLine !== null) {
          // Two chord lines in a row — flush first as orphan
          currentVerse.pairs.push({ chords: parseChordPositions(pendingChordLine), lyric: "" });
        }
        pendingChordLine = line;
        i++; continue;
      }

      // Lyric line
      if (pendingChordLine !== null) {
        // Pair the pending chord line with this lyric
        currentVerse.pairs.push({ chords: parseChordPositions(pendingChordLine), lyric: line });
        pendingChordLine = null;
      } else {
        currentVerse.pairs.push({ chords: [], lyric: line });
      }
      i++;
    }

    pushVerse();
    if (!verses.length) verses.push({ label: null, pairs: [{ chords: [], lyric: raw }] });
    return verses;
  }

  function parseInlineLine(line) {
    // Convert "[G]Here comes the [C]sun" into chords with character offsets into lyric
    var chords = [];
    var firstChordPos = line.search(/\[[A-G][^\]]*\]/);
    var lyric = firstChordPos > 0 ? line.slice(0, firstChordPos) : "";
    var searchStr = line.slice(firstChordPos >= 0 ? firstChordPos : 0);
    var r2 = /\[([A-G][^\]]*)\]([^\[]*)/g;
    var m;
    while ((m = r2.exec(searchStr)) !== null) {
      chords.push({ text: m[1], offset: lyric.length });
      lyric += m[2];
    }
    return { chords: chords, lyric: lyric };
  }

  function songBlockToRaw(block) {
    if (!block.verses) return "";
    return block.verses.map(function (v) {
      var out = [];
      if (v.label) out.push("[" + v.label + "]");
      v.pairs.forEach(function (p) {
        if (p.chords.length) {
          var inlineLine = "";
          var lyric = p.lyric || "";
          var lastPos = 0;
          var sorted = p.chords.slice().sort(function (a, b) { return a.offset - b.offset; });
          sorted.forEach(function (c) {
            inlineLine += lyric.slice(lastPos, c.offset) + "[" + c.text + "]";
            lastPos = c.offset;
          });
          inlineLine += lyric.slice(lastPos);
          out.push(inlineLine);
        } else {
          out.push(p.lyric || "");
        }
      });
      return out.join("\n");
    }).join("\n\n");
  }

  // ---- Chord diagram library ----
  // Format: [frets, fingers] where frets = [e,B,G,D,A,E] (high to low)
  // fret number = finger position, 0 = open, -1 = muted, 'b' = barre
  // Each entry: { frets: [6 values], barre: fret_number|null, baseFret: 1|n }
  var CHORD_LIBRARY = {
    "C":    { frets: [0,1,0,2,3,-1], baseFret: 1 },
    "Cm":   { frets: [3,4,5,5,3,3], baseFret: 3, barre: 3 },
    "C7":   { frets: [0,1,3,2,3,-1], baseFret: 1 },
    "Cmaj7":{ frets: [0,0,0,2,3,-1], baseFret: 1 },
