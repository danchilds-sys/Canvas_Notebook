  function getUniqueChordsFromBlock(block) {
    var seen = {};
    var order = [];
    (block.verses || []).forEach(function (verse) {
      (verse.pairs || []).forEach(function (pair) {
        (pair.chords || []).forEach(function (c) {
          if (c.text && !seen[c.text]) {
            seen[c.text] = true;
            order.push(c.text);
          }
        });
      });
    });
    return order;
  }

  function buildChordDiagramSVG(chordName, scale) {
    scale = scale || 1;
    var data = CHORD_LIBRARY[chordName];
    if (!data) return null;

    // Reverse frets so low E (index 5) is on the left
    var frets = data.frets.slice().reverse();
    var barre = data.barre || null;
    var baseFret = data.baseFret || 1;

    var strings = 6;
    var numFrets = 4;
    var cellW = 14 * scale;
    var cellH = 13 * scale;
    var padL = 10 * scale;
    var padT = 12 * scale;
    var padB = 4 * scale;
    var dotR = 4.5 * scale;
    var w = padL + (strings - 1) * cellW + padL;
    var h = padT + numFrets * cellH + padB;

    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 " + w + " " + h);
    svg.setAttribute("width", w);
    svg.setAttribute("height", h);

    function el(tag, attrs) {
      var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.keys(attrs).forEach(function (k) { e.setAttribute(k, attrs[k]); });
      return e;
    }

    // Nut or baseFret indicator
    if (baseFret === 1) {
      svg.appendChild(el("rect", { x: padL, y: padT - 3 * scale, width: (strings - 1) * cellW, height: 3 * scale, fill: "#3D332A", rx: 1 }));
    } else {
      var txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
      txt.setAttribute("x", padL - 5 * scale);
      txt.setAttribute("y", padT + cellH * 0.65);
      txt.setAttribute("font-size", 7 * scale);
      txt.setAttribute("fill", "#8A7D68");
      txt.setAttribute("text-anchor", "end");
      txt.setAttribute("font-family", "Inter, sans-serif");
      txt.textContent = baseFret + "fr";
      svg.appendChild(txt);
    }

    // Fret lines
    for (var f = 0; f <= numFrets; f++) {
      svg.appendChild(el("line", {
        x1: padL, y1: padT + f * cellH,
        x2: padL + (strings - 1) * cellW, y2: padT + f * cellH,
        stroke: "#C4B8A4", "stroke-width": scale
      }));
    }

    // String lines
    for (var s = 0; s < strings; s++) {
      svg.appendChild(el("line", {
        x1: padL + s * cellW, y1: padT,
        x2: padL + s * cellW, y2: padT + numFrets * cellH,
        stroke: "#C4B8A4", "stroke-width": scale
      }));
    }

    // Open / muted markers above nut
    frets.forEach(function (fret, si) {
      var x = padL + si * cellW;
      var y = padT - 6 * scale;
      if (fret === 0) {
        svg.appendChild(el("circle", { cx: x, cy: y, r: 2.5 * scale, fill: "none", stroke: "#8A7D68", "stroke-width": scale }));
      } else if (fret === -1) {
        svg.appendChild(el("text", { x: x, y: y + 2 * scale, "font-size": 7 * scale, fill: "#8A7D68", "text-anchor": "middle", "font-family": "Inter, sans-serif" }));
        var xt = el("text", { x: x, y: y + 2.5 * scale, "font-size": 7 * scale, fill: "#8A7D68", "text-anchor": "middle", "font-family": "Inter, sans-serif" });
        xt.textContent = "×";
        svg.appendChild(xt);
      }
    });

    // Barre
    if (barre !== null) {
      var barreRelFret = barre - baseFret + 1;
      var by = padT + (barreRelFret - 0.5) * cellH;
      var barreStrings = frets.map(function (f, i) { return f === barre ? i : -1; }).filter(function (i) { return i >= 0; });
      if (barreStrings.length >= 2) {
        var bx1 = padL + barreStrings[0] * cellW;
        var bx2 = padL + barreStrings[barreStrings.length - 1] * cellW;
        svg.appendChild(el("rect", { x: bx1, y: by - 4 * scale, width: bx2 - bx1, height: 8 * scale, rx: 4 * scale, fill: "#3D332A" }));
      }
    }

    // Finger dots
    frets.forEach(function (fret, si) {
      if (fret <= 0) return;
      if (barre !== null && fret === barre) return; // covered by barre bar
      var relFret = fret - baseFret + 1;
      var cx = padL + si * cellW;
      var cy = padT + (relFret - 0.5) * cellH;
      svg.appendChild(el("circle", { cx: cx, cy: cy, r: dotR, fill: "#3D332A" }));
    });

    return svg;
  }

  function buildChordDiagramRow(chordNames, scale, extraClass) {
    var row = document.createElement("div");
    row.className = "chord-diagram-row" + (extraClass ? " " + extraClass : "");
    chordNames.forEach(function (name) {
      var svg = buildChordDiagramSVG(name, scale);
      if (!svg) return; // unknown chord — skip
      var wrap = document.createElement("div");
      wrap.className = "chord-diagram" + (extraClass ? " perf-chord-diagram" : "");
      var label = document.createElement("div");
      label.className = "chord-diagram-name";
      label.textContent = name;
      wrap.appendChild(svg);
      wrap.appendChild(label);
      row.appendChild(wrap);
    });
    return row.children.length ? row : null;
  }

  // ---- Render a song block ----
  function renderSongBlock(block, blockEl) {
    var inner = blockEl.querySelector(".song-block-inner");
    inner.innerHTML = "";

    // Performance button at top of block
    var perfBtn = document.createElement("button");
    perfBtn.className = "song-perf-btn";
    perfBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/></svg> Performance';
    perfBtn.title = "Full screen performance mode";
    perfBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      openPerfMode(block);
    });
    inner.appendChild(perfBtn);

    // Song title and artist fields
    var meta = document.createElement("div");
    meta.className = "song-meta";
    var titleInput = document.createElement("input");
    titleInput.className = "song-title-input";
    titleInput.placeholder = "Song title";
    titleInput.value = block.songTitle || "";
    titleInput.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
    titleInput.addEventListener("input", function () {
      block.songTitle = titleInput.value;
      saveBlocksToCard(getActiveCard()); saveState();
    });
    var artistInput = document.createElement("input");
    artistInput.className = "song-artist-input";
    artistInput.placeholder = "Artist / writer";
    artistInput.value = block.songArtist || "";
    artistInput.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
    artistInput.addEventListener("input", function () {
      block.songArtist = artistInput.value;
      saveBlocksToCard(getActiveCard()); saveState();
    });
    meta.appendChild(titleInput);
    meta.appendChild(artistInput);
    var metaDivider = document.createElement("hr");
    metaDivider.className = "song-meta-divider";
    inner.appendChild(meta);
    inner.appendChild(metaDivider);

    var editBar = document.createElement("div");
    editBar.className = "song-edit-bar";

    if (!block.verses || !block.verses.length) {
      // Empty state
      var empty = document.createElement("div");
      empty.className = "song-empty-state";
      empty.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="width:28px;height:28px;color:var(--ink-faint)"><path d="M9 18V5l10-2v13"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="16" r="2.5"/></svg><span>Paste chords + lyrics or type below</span>';
      var pasteBtn = document.createElement("button");
      pasteBtn.className = "song-paste-btn";
      pasteBtn.textContent = "Paste from clipboard";
      pasteBtn.addEventListener("click", function () {
        navigator.clipboard.readText().then(function (text) {
          block.verses = parseUGRaw(text);
          saveBlocksToCard(getActiveCard());
          saveState();
          renderSongBlock(block, blockEl);
        }).catch(function () {
          showSongRawEditor(block, blockEl);
        });
      });
      empty.appendChild(pasteBtn);
      inner.appendChild(empty);

      editBar.appendChild(makeRawEditBtn(block, blockEl));
      inner.appendChild(editBar);
      return;
    }

    // Chord diagram reference row
    var uniqueChords = getUniqueChordsFromBlock(block);
    var diagramRow = buildChordDiagramRow(uniqueChords, 1, null);
    if (diagramRow) inner.appendChild(diagramRow);

    // Render verses
    var renderArea = document.createElement("div");
    renderArea.className = "song-render";

    block.verses.forEach(function (verse, vi) {
      var verseEl = document.createElement("div");
      verseEl.className = "song-verse";

      // Verse header: label input + merge + delete
      var verseHeader = document.createElement("div");
      verseHeader.className = "song-verse-header";

      var labelInput = document.createElement("input");
      labelInput.className = "song-verse-label-input";
      labelInput.placeholder = "Section label…";
      labelInput.value = verse.label || "";
      labelInput.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
      labelInput.addEventListener("input", function () {
        verse.label = labelInput.value.trim() || null;
        saveBlocksToCard(getActiveCard()); saveState();
      });
      verseHeader.appendChild(labelInput);

      // Merge with next verse button
      if (vi < block.verses.length - 1) {
        var mergeBtn = document.createElement("button");
        mergeBtn.className = "song-verse-btn";
        mergeBtn.title = "Merge with verse below";
        mergeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg> Merge';
        mergeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          // Append next verse's pairs into this one
          var next = block.verses[vi + 1];
          verse.pairs = verse.pairs.concat(next.pairs);
          block.verses.splice(vi + 1, 1);
          saveBlocksToCard(getActiveCard()); saveState();
          renderSongBlock(block, blockEl);
        });
        verseHeader.appendChild(mergeBtn);
      }

      // Delete verse button
      var delBtn = document.createElement("button");
      delBtn.className = "song-verse-btn delete";
      delBtn.title = "Delete this verse";
      delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg> Delete';
      delBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        block.verses.splice(vi, 1);
        saveBlocksToCard(getActiveCard()); saveState();
        renderSongBlock(block, blockEl);
      });
      verseHeader.appendChild(delBtn);

      verseEl.appendChild(verseHeader);

      verse.pairs.forEach(function (pair, pi) {
        var pairEl = document.createElement("div");
        pairEl.className = "song-pair";

        var lyric = pair.lyric || "";
        var sorted = (pair.chords || []).slice().sort(function (a, b) { return a.offset - b.offset; });

        // Build chord line as plain spaced text (monospace keeps alignment)
        var chordLine = document.createElement("div");
        chordLine.className = "song-chord-line";
        chordLine.style.color = "#A14C5A";

        if (sorted.length) {
          var chordStr = "";
          var pos = 0;
          sorted.forEach(function (chord) {
            var spaces = chord.offset - pos;
            if (spaces > 0) chordStr += Array(spaces + 1).join(" ");
            chordStr += chord.text;
            pos = chord.offset + chord.text.length;
          });
          chordLine.textContent = chordStr;
        }
        // If no chords, chord line is empty — it won't render, so only lyric shows

        // Lyric line — plain div, non-editable for simplicity
        var lyricLine = document.createElement("div");
        lyricLine.className = "song-lyric-line";
        lyricLine.textContent = lyric || "\u00a0";
        lyricLine.style.userSelect = "text";
        lyricLine.style.webkitUserSelect = "text";

        if (sorted.length) pairEl.appendChild(chordLine);
        pairEl.appendChild(lyricLine);
        verseEl.appendChild(pairEl);
      });

      renderArea.appendChild(verseEl);
    });

    inner.appendChild(renderArea);

    // Edit bar
    editBar.appendChild(makeRawEditBtn(block, blockEl));
    inner.appendChild(editBar);
  }

  function refocusChord(blockEl, vi, pi, ci) {
    var token = blockEl.querySelector('.song-chord-token[data-vi="' + vi + '"][data-pi="' + pi + '"][data-ci="' + ci + '"]');
    if (token) { token.classList.add("focused"); token.focus(); }
  }

  function makeRawEditBtn(block, blockEl) {
    var btn = document.createElement("button");
    btn.className = "song-action-btn";
    btn.textContent = block.verses && block.verses.length ? "Edit raw" : "Type markup";
    btn.addEventListener("click", function () { showSongRawEditor(block, blockEl); });
    return btn;
  }

  function showSongRawEditor(block, blockEl) {
    var inner = blockEl.querySelector(".song-block-inner");
    inner.innerHTML = "";

    var ta = document.createElement("textarea");
    ta.className = "song-raw-editor";
    ta.placeholder = "[Verse 1]\n[G]Here comes the [C]sun\n[G]Little darling\n\n[Chorus]\n[D]It's alright";
    ta.value = songBlockToRaw(block);
    ta.style.userSelect = "text";
    ta.style.webkitUserSelect = "text";
    inner.appendChild(ta);

    var bar = document.createElement("div");
    bar.className = "song-edit-bar";
    var doneBtn = document.createElement("button");
    doneBtn.className = "song-paste-btn";
    doneBtn.textContent = "Done";
    doneBtn.addEventListener("click", function () {
      block.verses = parseUGRaw(ta.value);
      saveBlocksToCard(getActiveCard()); saveState();
      renderSongBlock(block, blockEl);
    });
    bar.appendChild(doneBtn);
    inner.appendChild(bar);
    ta.focus();
  }

  function getActiveCard() {
    return activeCardId ? state.cards.filter(function (c) { return c.id === activeCardId; })[0] : null;
  }

  // ---- Block drag auto-scroll ----
  var blockScrollRaf = null;
  var blockScrollClientY = 0;
  function startBlockAutoScroll(clientY) {
    blockScrollClientY = clientY;
    if (blockScrollRaf) return; // already running — just update clientY above
    var container = document.getElementById("blocks-container");
    if (!container) return;
    function step() {
      var rect = container.getBoundingClientRect();
      var zone = 80;
      var speed = 0;
      if (blockScrollClientY < rect.top + zone) {
        speed = -((zone - (blockScrollClientY - rect.top)) / zone) * 32;
      } else if (blockScrollClientY > rect.bottom - zone) {
        speed = ((zone - (rect.bottom - blockScrollClientY)) / zone) * 32;
      }
      if (speed !== 0) container.scrollTop += speed;
      blockScrollRaf = requestAnimationFrame(step);
    }
    blockScrollRaf = requestAnimationFrame(step);
  }
  function stopBlockAutoScroll() {
    if (blockScrollRaf) { cancelAnimationFrame(blockScrollRaf); blockScrollRaf = null; }
  }

  // ---- Build a block DOM element ----
  function createBlockEl(block, card) {
    var blockEl = document.createElement("div");
    blockEl.className = "card-block block-" + block.type;
    blockEl.dataset.blockId = block.id;

    // Drag handle
    var handle = document.createElement("div");
    handle.className = "block-drag-handle";
    handle.innerHTML = '<svg viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/><circle cx="3" cy="8" r="1.2"/><circle cx="7" cy="8" r="1.2"/><circle cx="3" cy="13" r="1.2"/><circle cx="7" cy="13" r="1.2"/></svg>';
    handle.setAttribute("draggable", "true");
    blockEl.appendChild(handle);

    // Remove button
    var removeBtn = document.createElement("button");
    removeBtn.className = "block-remove-btn";
    removeBtn.innerHTML = "&times;";
    removeBtn.title = "Remove block";
    removeBtn.addEventListener("click", function () {
      card.blocks = card.blocks.filter(function (b) { return b.id !== block.id; });
      saveBlocksToCard(card); saveState(); refreshCanvas();
      renderBlocksContainer(card);
    });
    blockEl.appendChild(removeBtn);

    if (block.type === "text") {
      var ta = document.createElement("textarea");
      ta.placeholder = "Notes…";
      ta.value = block.content || "";
      ta.style.userSelect = "text";
      ta.style.webkitUserSelect = "text";
      ta.addEventListener("input", function () {
        block.content = ta.value;
        autoResizeTextarea(ta);
        saveBlocksToCard(card); saveState();
      });
      ta.addEventListener("keydown", function (e) {
        handleTextBlockKeydown(e, ta, block, card);
      });
      ta.addEventListener("click", function () {
        handleTextBlockClick(ta, block);
      });
      blockEl.appendChild(ta);
      setTimeout(function () { autoResizeTextarea(ta); }, 0);

    } else if (block.type === "image") {
      block.images = block.images || [];
      var gallery = document.createElement("div");
      gallery.className = "block-image-gallery";
      renderImageBlockGallery(gallery, block, card);
      blockEl.appendChild(gallery);

    } else if (block.type === "song") {
      var inner = document.createElement("div");
      inner.className = "song-block-inner";
      blockEl.appendChild(inner);
      renderSongBlock(block, blockEl);
    } else if (block.type === "video") {
      var inner = document.createElement("div");
      inner.className = "video-block-inner";
      blockEl.appendChild(inner);
      renderVideoBlock(block, blockEl);
    }

    // Drag-to-reorder via HTML5 drag (native scroll support)
    handle.setAttribute("draggable", "true");
    handle.addEventListener("dragstart", function (e) {
      e.dataTransfer.setData("text/plain", block.id);
      e.dataTransfer.effectAllowed = "move";
      setTimeout(function () { blockEl.classList.add("dragging"); }, 0);
    });
    handle.addEventListener("dragend", function () {
      blockEl.classList.remove("dragging");
      var container = document.getElementById("blocks-container");
      if (container) {
        container.querySelectorAll(".card-block").forEach(function (el) {
          el.classList.remove("drag-over-above", "drag-over-below");
        });
        var ind = container.querySelector(".block-drop-indicator");
        if (ind) ind.parentNode.removeChild(ind);
      }
    });

    return blockEl;
  }

  function renderImageBlockGallery(gallery, block, card) {
    gallery.innerHTML = "";
    (block.images || []).forEach(function (imgObj) {
      var thumb = document.createElement("div");
      thumb.className = "card-image-thumb";
      var imgTag = document.createElement("img");
      imgTag.src = imgObj.src;
      thumb.appendChild(imgTag);
      var removeBtn = document.createElement("button");
      removeBtn.className = "thumb-remove";
      removeBtn.textContent = "\u00d7";
      removeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        block.images = block.images.filter(function (im) { return im.id !== imgObj.id; });
        saveBlocksToCard(card); saveState(); refreshCanvas();
        renderImageBlockGallery(gallery, block, card);
      });
      thumb.appendChild(removeBtn);
      gallery.appendChild(thumb);
    });

    // Add image button
    var addBtn = document.createElement("label");
    addBtn.className = "block-image-add";
    addBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';
    var inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*"; inp.hidden = true;
    inp.addEventListener("change", function (e) {
      var files = Array.from(e.target.files);
      var pending = files.length;
      if (!pending) return;
      files.forEach(function (file) {
        var reader = new FileReader();
        reader.onload = function (ev) {
          block.images = block.images || [];
          block.images.push({ id: uid(), src: ev.target.result });
          pending--;
          if (!pending) {
            saveBlocksToCard(card); saveState(); refreshCanvas();
            renderImageBlockGallery(gallery, block, card);
          }
        };
        reader.readAsDataURL(file);
      });
      inp.value = "";
    });
    addBtn.appendChild(inp);
    gallery.appendChild(addBtn);
  }

  function autoResizeTextarea(ta) {
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";
  }

  function handleTextBlockKeydown(e, ta, block, card) {
    if (e.key !== "Enter") return;
    var pos = ta.selectionStart;
    var text = ta.value;
    var lineStart = text.lastIndexOf("\n", pos - 1) + 1;
    var currentLine = text.slice(lineStart, pos);
    var checkMatch = currentLine.match(/^(\[[ x]\]\s)/);
    var bulletMatch = currentLine.match(/^(-\s)/);
    var prefix = checkMatch ? "[ ] " : (bulletMatch ? "- " : null);
    if (!prefix) return;
    var matchedLength = checkMatch ? checkMatch[0].length : bulletMatch[0].length;
    if (currentLine.slice(matchedLength).trim() === "") {
      e.preventDefault();
      var before = text.slice(0, lineStart);
      var after = text.slice(pos);
      ta.value = before + after;
      ta.selectionStart = ta.selectionEnd = lineStart;
      block.content = ta.value;
      return;
    }
    e.preventDefault();
    var insertion = "\n" + prefix;
    ta.value = text.slice(0, pos) + insertion + text.slice(pos);
    ta.selectionStart = ta.selectionEnd = pos + insertion.length;
    block.content = ta.value;
    autoResizeTextarea(ta);
  }

  function handleTextBlockClick(ta, block) {
    var pos = ta.selectionStart;
    var text = ta.value;
    var lineStart = text.lastIndexOf("\n", pos - 1) + 1;
    var lineEnd = text.indexOf("\n", pos);
    if (lineEnd === -1) lineEnd = text.length;
    var line = text.slice(lineStart, lineEnd);
    var match = line.match(/^\[([ x])\]/);
    if (match && (pos - lineStart) <= 3) {
      var newChar = match[1] === " " ? "x" : " ";
      var newLine = "[" + newChar + "]" + line.slice(3);
      ta.value = text.slice(0, lineStart) + newLine + text.slice(lineEnd);
      block.content = ta.value;
      saveState();
    }
  }

  function insertIntoFocusedTextBlock(prefix) {
    var container = document.getElementById("blocks-container");
    var ta = container.querySelector(".block-text textarea:focus");
    if (!ta) {
      // Insert into first text block or create one
      var firstText = container.querySelector(".block-text textarea");
      if (firstText) { firstText.focus(); ta = firstText; }
      else { addBlock("text"); return; }
    }
    ta.focus();
    var pos = ta.selectionStart;
    var text = ta.value;
    var needsNewline = pos > 0 && text.charAt(pos - 1) !== "\n";
    var insertion = (needsNewline ? "\n" : "") + prefix;
    ta.value = text.slice(0, pos) + insertion + text.slice(pos);
    var newPos = pos + insertion.length;
    ta.selectionStart = ta.selectionEnd = newPos;
    ta.dispatchEvent(new Event("input"));
  }

  function addBlock(type) {
    var card = getActiveCard();
    if (!card) return;
    var block = { id: uid(), type: type };
    if (type === "text") block.content = "";
    if (type === "image") block.images = [];
    if (type === "song") block.verses = [];
    if (type === "video") { block.videoId = null; block.videoUrl = ""; }
    card.blocks.push(block);
    saveBlocksToCard(card); saveState(); refreshCanvas();
    renderBlocksContainer(card);
    // Focus the new block
    setTimeout(function () {
      var container = document.getElementById("blocks-container");
      var newEl = container.querySelector('.card-block[data-block-id="' + block.id + '"]');
      if (!newEl) return;
      if (type === "text") {
        var ta = newEl.querySelector("textarea");
        if (ta) ta.focus();
      } else if (type === "song") {
        newEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }, 50);
  }

  function renderBlocksContainer(card) {
    // Replace container to clear all previous event listeners
    var old = document.getElementById("blocks-container");
    var container = old.cloneNode(false);
    old.parentNode.replaceChild(container, old);
    container.innerHTML = "";

    (card.blocks || []).forEach(function (block) {
      container.appendChild(createBlockEl(block, card));
    });

    var draggedBlockId = null;

    container.addEventListener("dragover", function (e) {
      e.preventDefault();
      // Clear old indicators
      container.querySelectorAll(".block-drop-indicator").forEach(function(el) { el.parentNode.removeChild(el); });
      container.querySelectorAll(".card-block").forEach(function(el) { el.classList.remove("drag-over-above","drag-over-below"); });

      var blocks = Array.from(container.querySelectorAll(".card-block:not(.dragging)"));
      if (!blocks.length) return;
      var best = null, bestDist = Infinity;
      blocks.forEach(function (el) {
        var r = el.getBoundingClientRect();
        var dist = Math.abs(e.clientY - (r.top + r.height / 2));
        if (dist < bestDist) { bestDist = dist; best = el; }
      });
      if (!best) return;
      var br = best.getBoundingClientRect();
      var above = e.clientY < br.top + Math.min(40, br.height * 0.35);
      var ind = document.createElement("div");
      ind.className = "block-drop-indicator";
      ind.style.cssText = "height:3px;background:#A14C5A;border-radius:2px;margin:2px 0;pointer-events:none;";
      container.insertBefore(ind, above ? best : best.nextSibling);
      best.dataset.dropTarget = above ? "above" : "below";
    });

    container.addEventListener("drop", function (e) {
      e.preventDefault();
      container.querySelectorAll(".block-drop-indicator").forEach(function(el) { el.parentNode.removeChild(el); });
      var fromId = e.dataTransfer.getData("text/plain");
      if (!fromId) return;
      var target = container.querySelector(".card-block[data-drop-target]");
      if (!target) return;
      var above = target.dataset.dropTarget === "above";
      var targetId = target.dataset.blockId;
      delete target.dataset.dropTarget;
      if (fromId === targetId) return;
      var fromIdx = card.blocks.findIndex(function(b) { return b.id === fromId; });
      var toIdx   = card.blocks.findIndex(function(b) { return b.id === targetId; });
      if (fromIdx === -1 || toIdx === -1) return;
      var moved = card.blocks.splice(fromIdx, 1)[0];
      var newTo = card.blocks.findIndex(function(b) { return b.id === targetId; });
      card.blocks.splice(above ? newTo : newTo + 1, 0, moved);
      saveBlocksToCard(card); saveState(); refreshCanvas();
      renderBlocksContainer(card);
    });
  }

  // ---- Modal ----
  function openCard(id) {
    activeCardId = id;
    var card = state.cards.filter(function (c) { return c.id === id; })[0];
    migrateCardToBlocks(card);
    modalTitle.value = card.title || "";
    catSwatches.forEach(function (sw) {
      sw.classList.toggle("selected", sw.dataset.cat === card.category);
    });
    setModalHeaderColor(card.category);
    if (state.modalSize) {
      modal.style.width = state.modalSize.width + "px";
      modal.style.height = state.modalSize.height + "px";
    }
    renderBlocksContainer(card);
    modalDelete.classList.remove("hidden");
    document.getElementById("delete-confirm").classList.add("hidden");
    overlay.classList.add("open");
    modalTitle.focus();
  }

  function openCardFromOrigin(id, originEl) {
    openCard(id);

    var originRect = originEl.getBoundingClientRect();
    var originCenterX = originRect.left + originRect.width / 2;
    var originCenterY = originRect.top + originRect.height / 2;

    modal.style.transition = "none";
    var modalRect = modal.getBoundingClientRect();
    var modalCenterX = modalRect.left + modalRect.width / 2;
    var modalCenterY = modalRect.top + modalRect.height / 2;
    var dx = originCenterX - modalCenterX;
    var dy = originCenterY - modalCenterY;
    var scaleRatio = Math.max(0.08, Math.min(1, originRect.width / modalRect.width));

    modal.style.transform = "translate(" + dx + "px, " + dy + "px) scale(" + scaleRatio + ") rotateY(-85deg)";
    modal.style.opacity = "0.4";
    modal.getBoundingClientRect();

    requestAnimationFrame(function () {
      modal.style.transition = "transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease";
      modal.style.transform = "translate(0px, 0px) scale(1) rotateY(0deg)";
      modal.style.opacity = "1";
    });

    function cleanup() {
      modal.style.transition = "";
      modal.style.transform = "";
      modal.style.opacity = "";
      modal.removeEventListener("transitionend", cleanup);
    }
    modal.addEventListener("transitionend", cleanup);
  }

  function renderCardImageGallery(card) {
    cardImageGallery.innerHTML = "";
    card.images.forEach(function (imgObj) {
      var thumb = document.createElement("div");
      thumb.className = "card-image-thumb";

      var imgTag = document.createElement("img");
      imgTag.src = imgObj.src;
      thumb.appendChild(imgTag);

      var removeBtn = document.createElement("button");
      removeBtn.className = "thumb-remove";
      removeBtn.textContent = "\u00d7";
      removeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        card.images = card.images.filter(function (im) { return im.id !== imgObj.id; });
        saveState();
        renderCardImageGallery(card);
        refreshCanvas();
      });
      thumb.appendChild(removeBtn);

      cardImageGallery.appendChild(thumb);
    });
  }

  function closeModal() {
    var cardId = activeCardId;
    var card = cardId ? state.cards.filter(function (c) { return c.id === cardId; })[0] : null;

    if (card) {
      card.title = modalTitle.value;
      saveBlocksToCard(card);
      var selected = document.querySelector(".cat-icon-btn.selected");
      if (selected) card.category = selected.dataset.cat;
      saveState();
      refreshCanvas();
    }
    activeCardId = null;

    var cardEl = card ? itemsLayer.querySelector('.card[data-id="' + cardId + '"]') : null;
    if (!cardEl) {
      overlay.classList.remove("open");
      return;
    }

    var cardRect = cardEl.getBoundingClientRect();
    var modalRect = modal.getBoundingClientRect();
    var dx = (cardRect.left + cardRect.width / 2) - (modalRect.left + modalRect.width / 2);
    var dy = (cardRect.top + cardRect.height / 2) - (modalRect.top + modalRect.height / 2);
    var scaleRatio = Math.max(0.08, Math.min(1, cardRect.width / modalRect.width));

    modal.style.transition = "none";
    modal.style.transform = "translate(0px, 0px) scale(1) rotateY(0deg)";
    modal.style.opacity = "1";
    modal.getBoundingClientRect();

    requestAnimationFrame(function () {
      modal.style.transition = "transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease";
      modal.style.transform = "translate(" + dx + "px, " + dy + "px) scale(" + scaleRatio + ") rotateY(70deg)";
      modal.style.opacity = "0";
      overlay.classList.remove("open");
    });

    function cleanup() {
      modal.style.transition = "";
      modal.style.transform = "";
      modal.style.opacity = "";
      modal.removeEventListener("transitionend", cleanup);
    }
    modal.addEventListener("transitionend", cleanup);
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);

  // ---- Performance mode ----
  var perfOverlay = document.getElementById("perf-overlay");
  var perfSongTitle = document.getElementById("perf-song-title");
  var perfSongArtist = document.getElementById("perf-song-artist");
  var perfColumns = document.getElementById("perf-columns");
  var perfDiagrams = document.getElementById("perf-diagrams");

  function openPerfMode(songBlock) {
    var card = getActiveCard();
    if (!card) return;
    migrateCardToBlocks(card);

    perfSongTitle.textContent = (songBlock && songBlock.songTitle) ? songBlock.songTitle : (card.title || "Untitled");
    perfSongArtist.textContent = (songBlock && songBlock.songArtist) ? songBlock.songArtist : "";

    // Chord diagrams inline in header
    perfDiagrams.innerHTML = "";
    if (songBlock) {
      var uniqueChords = getUniqueChordsFromBlock(songBlock);
      uniqueChords.forEach(function (name) {
        var svg = buildChordDiagramSVG(name, 0.85);
        if (!svg) return;
        var wrap = document.createElement("div");
        wrap.className = "chord-diagram perf-chord-diagram";
        var label = document.createElement("div");
        label.className = "chord-diagram-name";
        label.textContent = name;
        wrap.appendChild(svg);
        wrap.appendChild(label);
        perfDiagrams.appendChild(wrap);
      });
    }

    // Use the specific song block if passed, else collect all song blocks
    var units = [];
    if (songBlock && songBlock.verses && songBlock.verses.length) {
      songBlock.verses.forEach(function (v) { units.push({ kind: "verse", verse: v }); });
    } else {
      (card.blocks || []).forEach(function (block) {
        if (block.type === "song" && block.verses && block.verses.length) {
          block.verses.forEach(function (v) { units.push({ kind: "verse", verse: v }); });
        } else if (block.type === "text" && block.content && block.content.trim()) {
          units.push({ kind: "text", content: block.content });
        }
      });
    }

    // Split into three balanced columns by unit count
    var third = Math.ceil(units.length / 3);
    var cols = [units.slice(0, third), units.slice(third, third * 2), units.slice(third * 2)];

    perfColumns.innerHTML = "";
    cols.forEach(function (colUnits) {
      var col = document.createElement("div");
      col.className = "perf-col";
      colUnits.forEach(function (unit) {
        if (unit.kind === "verse") {
          col.appendChild(renderPerfVerse(unit.verse));
        } else {
          var el = document.createElement("div");
          el.className = "perf-text-block";
          el.textContent = unit.content;
          col.appendChild(el);
        }
      });
      perfColumns.appendChild(col);
    });

    perfOverlay.classList.add("open");

    // Request fullscreen
    if (perfOverlay.requestFullscreen) perfOverlay.requestFullscreen().catch(function(){});
    else if (perfOverlay.webkitRequestFullscreen) perfOverlay.webkitRequestFullscreen();
  }

  function renderPerfVerse(verse) {
    var verseEl = document.createElement("div");
    verseEl.className = "perf-verse";
    if (verse.label) {
      var label = document.createElement("div");
      label.className = "perf-section-label";
      label.textContent = verse.label;
      verseEl.appendChild(label);
    }
    (verse.pairs || []).forEach(function (pair) {
      var pairEl = document.createElement("div");
      pairEl.className = "perf-pair";

      var chordLine = document.createElement("div");
      chordLine.className = "perf-chord-line";
      chordLine.style.color = "#A14C5A";
      var lyric = pair.lyric || "";
      var sorted = (pair.chords || []).slice().sort(function (a, b) { return a.offset - b.offset; });
      if (sorted.length) {
        var chordStr = "";
        var pos = 0;
        sorted.forEach(function (chord) {
          var spaces = chord.offset - pos;
          if (spaces > 0) chordStr += Array(spaces + 1).join(" ");
          chordStr += chord.text;
          pos = chord.offset + chord.text.length;
        });
        chordLine.textContent = chordStr;
        pairEl.appendChild(chordLine);
      }

      var lyricLine = document.createElement("div");
      lyricLine.className = "perf-lyric-line";
      lyricLine.textContent = lyric || "\u00a0";

      pairEl.appendChild(chordLine);
      pairEl.appendChild(lyricLine);
      verseEl.appendChild(pairEl);
    });
    return verseEl;
  }

  function closePerfMode() {
    perfOverlay.classList.remove("open");
    if (document.fullscreenElement) document.exitFullscreen().catch(function(){});
    else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
  }

  document.getElementById("perf-close").addEventListener("click", closePerfMode);
  document.addEventListener("fullscreenchange", function () {
    if (!document.fullscreenElement) perfOverlay.classList.remove("open");
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && perfOverlay.classList.contains("open")) {
      closePerfMode();
    }
  });
  overlay.addEventListener("pointerdown", function (e) {
    if (e.target === overlay) closeModal();
  });

  catSwatches.forEach(function (sw) {
    sw.addEventListener("click", function () {
      catSwatches.forEach(function (s) { s.classList.remove("selected"); });
      sw.classList.add("selected");
      setModalHeaderColor(sw.dataset.cat);
    });
  });

  modalResizeHandle.addEventListener("pointerdown", function (e) {
    e.stopPropagation();
    modalResizeHandle.setPointerCapture(e.pointerId);
    var startX = e.clientX, startY = e.clientY;
    var startRect = modal.getBoundingClientRect();
    var startW = startRect.width, startH = startRect.height;

    function move(ev) {
      var newW = Math.max(300, startW + (ev.clientX - startX));
      var newH = Math.max(320, startH + (ev.clientY - startY));
      modal.style.width = newW + "px";
      modal.style.height = newH + "px";
    }

    function up(ev) {
      modalResizeHandle.removeEventListener("pointermove", move);
      modalResizeHandle.removeEventListener("pointerup", up);
      modalResizeHandle.releasePointerCapture(ev.pointerId);
      var finalRect = modal.getBoundingClientRect();
      state.modalSize = { width: finalRect.width, height: finalRect.height };
      saveState();
    }

    modalResizeHandle.addEventListener("pointermove", move);
    modalResizeHandle.addEventListener("pointerup", up);
  });

  // ---- Block toolbar handlers ----
  document.getElementById("btn-add-text").addEventListener("click", function () { addBlock("text"); });
  document.getElementById("btn-add-image").addEventListener("click", function () { addBlock("image"); });
  document.getElementById("btn-add-song").addEventListener("click", function () { addBlock("song"); });
  document.getElementById("btn-add-heading").addEventListener("click", function () { insertIntoFocusedTextBlock("## "); });
  document.getElementById("btn-add-bullet").addEventListener("click", function () { insertIntoFocusedTextBlock("- "); });
  document.getElementById("btn-add-checklist").addEventListener("click", function () { insertIntoFocusedTextBlock("[ ] "); });

  modalDelete.addEventListener("click", function () {
    modalDelete.classList.add("hidden");
    document.getElementById("delete-confirm").classList.remove("hidden");
  });

  document.getElementById("delete-confirm-cancel").addEventListener("click", function () {
    document.getElementById("delete-confirm").classList.add("hidden");
    modalDelete.classList.remove("hidden");
  });

  document.getElementById("delete-confirm-yes").addEventListener("click", function () {
    if (!activeCardId) return;
    state.cards = state.cards.filter(function (c) { return c.id !== activeCardId; });
    state.connections = state.connections.filter(function (c) { return c.from !== activeCardId && c.to !== activeCardId; });
    saveState();
    activeCardId = null;
    overlay.classList.remove("open");
    refreshCanvas();
  });

  // ---- Card groups (visual stacks) ----
  var GROUP_HEADER_HEIGHT = 40;
  var GROUP_PADDING = 8;
  var GROUP_GAP = 8;
  var GROUP_HEADER_CHROME = 160;
  var GROUP_MIN_WIDTH = 280;
  var TABLE_ROW_HEIGHT = 32;
  var TABLE_NAME_COL_WIDTH = 130;
  var TABLE_COL_WIDTH = 110;
  var TABLE_ADD_COL_WIDTH = 28;

  var groupTitleMeasureEl = document.createElement("span");
  groupTitleMeasureEl.style.position = "absolute";
  groupTitleMeasureEl.style.visibility = "hidden";
  groupTitleMeasureEl.style.left = "-9999px";
  groupTitleMeasureEl.style.top = "-9999px";
  groupTitleMeasureEl.style.whiteSpace = "pre";
  groupTitleMeasureEl.style.fontFamily = "Lora, serif";
  groupTitleMeasureEl.style.fontWeight = "600";
  groupTitleMeasureEl.style.fontSize = "13px";
  document.body.appendChild(groupTitleMeasureEl);

  function measureGroupTitleWidth(text) {
    groupTitleMeasureEl.textContent = text || "";
    return groupTitleMeasureEl.scrollWidth;
  }

  function computeTableLayout(group) {
    var cards = group.cardIds.map(function (id) {
      return state.cards.filter(function (c) { return c.id === id; })[0];
    }).filter(Boolean);
    var colCount = group.properties.length;
    var bodyWidth = TABLE_NAME_COL_WIDTH + colCount * TABLE_COL_WIDTH + TABLE_ADD_COL_WIDTH;

    var titleText = (group.title && group.title.length) ? group.title : "Untitled stack";
    var titleNeeds = measureGroupTitleWidth(titleText) + GROUP_HEADER_CHROME;
    bodyWidth = Math.max(bodyWidth, titleNeeds);

    // Never narrower than the notebook layout would be, so the header never overflows the frame
    var notebookLayout = computeGroupLayout(group);
    bodyWidth = Math.max(bodyWidth, notebookLayout.frameWidth);

    var bodyHeight = TABLE_ROW_HEIGHT * (cards.length + 1) + 36;
    return { cards: cards, bodyWidth: bodyWidth, bodyHeight: bodyHeight, frameWidth: bodyWidth, frameHeight: GROUP_HEADER_HEIGHT + bodyHeight };
  }

  function computeGroupLayout(group) {
    var cards = group.cardIds.map(function (id) {
      return state.cards.filter(function (c) { return c.id === id; })[0];
    }).filter(Boolean);
    var width = GROUP_MIN_WIDTH;
    if (group.manualWidth) {
      width = Math.max(GROUP_MIN_WIDTH - GROUP_PADDING * 2, group.manualWidth - GROUP_PADDING * 2);
    } else {
      cards.forEach(function (c) { width = Math.max(width, c.width || 170); });
    }

    var titleText = (group.title && group.title.length) ? group.title : "Untitled stack";
    var titleNeeds = measureGroupTitleWidth(titleText) + GROUP_HEADER_CHROME;
    width = Math.max(width, titleNeeds - GROUP_PADDING * 2);

    var frameWidth = width + GROUP_PADDING * 2;
    var y = group.y + GROUP_HEADER_HEIGHT + GROUP_PADDING;
    var rows = cards.map(function (c) {
      // Always stretch card to fill available width
      var row = { card: c, x: group.x + GROUP_PADDING, y: y, width: width };
      y += (c.height || 90) + GROUP_GAP;
      return row;
    });
    var frameHeight = (cards.length ? y - GROUP_GAP : y) + GROUP_PADDING - group.y;
    return { cards: cards, rows: rows, frameWidth: frameWidth, frameHeight: frameHeight };
  }

  function renderCardGroup(group) {
    var isTable = group.viewMode === "table";
    var layout = isTable ? computeTableLayout(group) : computeGroupLayout(group);

    var frame = document.createElement("div");
    frame.className = "card-group-frame" + (isTable ? " table-mode" : "") + (selectedGroupIds.has(group.id) ? " selected" : "");
    frame.style.left = group.x + "px";
    frame.style.top = group.y + "px";
    frame.style.width = layout.frameWidth + "px";
    frame.style.height = (group.collapsed ? GROUP_HEADER_HEIGHT : (isTable ? GROUP_HEADER_HEIGHT : layout.frameHeight)) + "px";
    frame.dataset.id = group.id;

    // Drag bar — sits above the header, always grabbable
    var dragBar = document.createElement("div");
    dragBar.className = "card-group-drag-bar";
    var dots = document.createElement("div");
    dots.className = "card-group-drag-bar-dots";
    for (var d = 0; d < 6; d++) dots.appendChild(document.createElement("span"));
    dragBar.appendChild(dots);
    frame.appendChild(dragBar);

    var header = document.createElement("div");
    header.className = "card-group-header";

    var collapseBtn = document.createElement("button");
    collapseBtn.className = "group-collapse-btn";
    collapseBtn.title = group.collapsed ? "Expand" : "Collapse";
    collapseBtn.innerHTML = group.collapsed
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
    collapseBtn.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
    collapseBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      group.collapsed = !group.collapsed;
      saveState();
      var beforeCollapse = captureItemRects();
      refreshCanvas();
      playFlipAnimation(beforeCollapse);
    });
    header.appendChild(collapseBtn);

    var titleInput = document.createElement("input");
    titleInput.className = "card-group-title-input";
    titleInput.placeholder = "Untitled stack";
    titleInput.value = group.title || "";
    titleInput.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
    titleInput.addEventListener("input", function () {
      group.title = titleInput.value;
      var newLayout = isTable ? computeTableLayout(group) : computeGroupLayout(group);
      frame.style.width = newLayout.frameWidth + "px";
      if (!group.collapsed) {
        frame.style.height = (isTable ? GROUP_HEADER_HEIGHT : newLayout.frameHeight) + "px";
        if (isTable) {
          var tableEl = itemsLayer.querySelector('.card-group-table[data-id="' + group.id + '"]');
          if (tableEl) { tableEl.style.width = newLayout.bodyWidth + "px"; tableEl.style.left = group.x + "px"; }
        } else {
          newLayout.rows.forEach(function (row) {
            var cardEl = itemsLayer.querySelector('.card[data-id="' + row.card.id + '"]');
            if (cardEl) { cardEl.style.width = row.width + "px"; cardEl.style.left = row.x + "px"; }
          });
        }
      }
      renderConnections();
    });
    titleInput.addEventListener("change", function () {
      saveState();
    });
    header.appendChild(titleInput);

    if (group.collapsed) {
      var countBadge = document.createElement("span");
      countBadge.className = "group-count-badge";
      countBadge.textContent = group.cardIds.length;
      header.appendChild(countBadge);
    }

    var viewToggle = document.createElement("div");
    viewToggle.className = "group-view-toggle";

    var notebookBtn = document.createElement("button");

    // X-axis resize handle
    var groupResizeHandle = document.createElement("div");

    frame.appendChild(groupResizeHandle);
    groupResizeHandle.addEventListener("pointerdown", function (e) {
      e.stopPropagation();
      groupResizeHandle.setPointerCapture(e.pointerId);
      var startX = e.clientX;
      var startWidth = layout.frameWidth;
      frame.style.transition = "none";
      function move(ev) {
        var dx = (ev.clientX - startX) / scale;
        var newWidth = Math.max(GROUP_MIN_WIDTH, startWidth + dx);
        group.manualWidth = newWidth;
        frame.style.width = newWidth + "px";
        // Live-update card widths inside
        var newLayout = computeGroupLayout(group);
        newLayout.rows.forEach(function (row) {
          var cardEl = itemsLayer.querySelector('.card[data-id="' + row.card.id + '"]');
          if (cardEl) {
            cardEl.style.transition = "none";
            cardEl.style.width = row.width + "px";
          }
        });
      }
      function up(ev) {
        groupResizeHandle.removeEventListener("pointermove", move);
        groupResizeHandle.removeEventListener("pointerup", up);
        groupResizeHandle.releasePointerCapture(ev.pointerId);
        // Apply final width to cards in state and re-render
        var finalLayout = computeGroupLayout(group);
        finalLayout.rows.forEach(function (row) {
          row.card.width = row.width;
        });
        saveState();
        refreshCanvas();
      }
      groupResizeHandle.addEventListener("pointermove", move);
      groupResizeHandle.addEventListener("pointerup", up);
    });
    groupResizeHandle.addEventListener("click", function (e) { e.stopPropagation(); });

    frame.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openStackMenu(group, "group", e.clientX, e.clientY);
    });

    function startGroupDrag(e, captureEl) {
      e.stopPropagation();
      if (!selectedGroupIds.has(group.id)) {
        clearSelection();
        selectedGroupIds.add(group.id);
        frame.classList.add("selected");
      }
      captureEl.setPointerCapture(e.pointerId);
      frame.style.transition = "none";
      var startX = e.clientX, startY = e.clientY;
      var startGX = group.x, startGY = group.y;

      function move(ev) {
        var dx = (ev.clientX - startX) / scale;
        var dy = (ev.clientY - startY) / scale;
        var newGX = startGX + dx;
        var newGY = startGY + dy;
        var incDx = newGX - group.x;
        var incDy = newGY - group.y;
        group.x = newGX;
        group.y = newGY;
        frame.style.left = group.x + "px";
        frame.style.top = group.y + "px";
        if (isTable) {
          var tableEl = itemsLayer.querySelector('.card-group-table[data-id="' + group.id + '"]');
          if (tableEl) {
            tableEl.style.transition = "none";
            tableEl.style.left = group.x + "px";
            tableEl.style.top = (group.y + GROUP_HEADER_HEIGHT) + "px";
          }
        } else {
          var newLayout = computeGroupLayout(group);
          newLayout.rows.forEach(function (row) {
            var cardEl = itemsLayer.querySelector('.card[data-id="' + row.card.id + '"]');
            if (cardEl) { cardEl.style.transition = "none"; cardEl.style.left = row.x + "px"; cardEl.style.top = row.y + "px"; }
          });
        }
        moveOtherSelectedItems(incDx, incDy, "group", group.id);
        renderConnections();
      }

      function up(ev) {
        captureEl.removeEventListener("pointermove", move);
        captureEl.removeEventListener("pointerup", up);
        captureEl.releasePointerCapture(ev.pointerId);
        saveState();
        clearAllTransitionOverrides();
      }

      captureEl.addEventListener("pointermove", move);
      captureEl.addEventListener("pointerup", up);
    }

    // Drag bar — always draggable
    dragBar.addEventListener("pointerdown", function (e) {
      startGroupDrag(e, dragBar);
    });

    frame.appendChild(header);
    itemsLayer.appendChild(frame);

    header.addEventListener("pointerdown", function (e) {
      if (e.target === titleInput || (e.target.closest && (e.target.closest(".unstack-btn") || e.target.closest(".group-collapse-btn") || e.target.closest(".group-view-toggle") || e.target.closest(".connect-handle")))) return;
      startGroupDrag(e, header);
    });

    if (!group.collapsed) {
      if (isTable) {
        renderGroupTable(group, frame);
      } else {
        layout.rows.forEach(function (row) {
          renderCard(row.card, { x: row.x, y: row.y, width: row.width });
        });
      }
    }
  }

  function addCardToGroup(group) {
    var card = {
      id: uid(),
      title: "",
      notes: "",
      category: "idea",
      x: group.x,
      y: group.y,
      properties: {},
      z: getMaxZ() + 1
    };
    state.cards.push(card);
    group.cardIds.push(card.id);
    saveState();
    var beforeAddRow = captureItemRects();
    refreshCanvas();
    playFlipAnimation(beforeAddRow);
  }

  function renderTableCellContent(cell, card, prop) {
    cell.innerHTML = "";
    var value = card.properties[prop.id];

    if (prop.type === "select") {
      var opt = value ? (prop.options || []).filter(function (o) { return o.id === value; })[0] : null;
      if (opt) {
        var pill = document.createElement("span");
        pill.className = "table-tag-pill";
        pill.style.background = opt.color.bg;
        pill.style.color = opt.color.ink;
        pill.textContent = opt.label;
        pill.addEventListener("click", function (e) {
          e.stopPropagation();
          openOptionPicker(prop, card, cell);
        });
        cell.appendChild(pill);
      } else {
        var empty = document.createElement("span");
        empty.className = "table-tag-empty";
        empty.textContent = "+";
        empty.addEventListener("click", function (e) {
          e.stopPropagation();
          openOptionPicker(prop, card, cell);
        });
        cell.appendChild(empty);
      }
      return;
    }

    var span = document.createElement("span");
    span.textContent = value || "";
    span.style.width = "100%";
    span.style.minHeight = "16px";
    span.style.cursor = "text";
    cell.appendChild(span);
    cell.addEventListener("click", function cellClick(e) {
      e.stopPropagation();
      cell.removeEventListener("click", cellClick);
      var input = document.createElement("input");
      input.className = "table-cell-input";
      input.type = prop.type === "number" ? "number" : "text";
      input.value = value || "";
      cell.innerHTML = "";
      cell.appendChild(input);
      input.focus();
      input.addEventListener("pointerdown", function (ev) { ev.stopPropagation(); });
      input.addEventListener("blur", function () {
        card.properties[prop.id] = input.value;
        saveState();
        renderTableCellContent(cell, card, prop);
      });
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") input.blur();
      });
    });
  }

  // ---- Property creation popup ----
  var propertyCreatePopup = document.getElementById("property-create-popup");
  var propertyCreateContext = null;
  var propertyCreateType = "text";

  var popupScrim = document.getElementById("popup-scrim");

  function showPopupScrim() {
    popupScrim.classList.remove("hidden");
  }

  function hidePopupScrimIfBothClosed() {
    if (propertyCreatePopup.classList.contains("hidden") && optionPickerPopup.classList.contains("hidden") && shapeTypePopup.classList.contains("hidden")) {
      popupScrim.classList.add("hidden");

    var name = document.getElementById("property-name-input").value.trim();

    var prop = { id: uid(), name: name, type: propertyCreateType };

    closePropertyCreatePopup();
    var beforeAddCol = captureItemRects();

    playFlipAnimation(beforeAddCol);

  // ---- Option picker popup (for select-type cells) ----
  var optionPickerPopup = document.getElementById("option-picker-popup");
  var optionPickerContext = null;

  function openOptionPicker(prop, card, cell) {
    closeConnectorPopup();
    closeStackMenu();
    closeCanvasColorPopup();
    closeGroupCreatePopup();
    closePropertyCreatePopup();
    optionPickerContext = { prop: prop, card: card, cell: cell };
    renderOptionPickerList();
    document.getElementById("option-picker-new-input").value = "";
    showPopupScrim();
    optionPickerPopup.classList.remove("hidden");
  }

  function closeOptionPicker() {
    optionPickerPopup.classList.add("hidden");
    hidePopupScrimIfBothClosed();
    optionPickerContext = null;
  }

  function renderOptionPickerList() {
    var list = document.getElementById("option-picker-list");
    list.innerHTML = "";
    if (!optionPickerContext) return;
    (optionPickerContext.prop.options || []).forEach(function (opt) {
      var row = document.createElement("div");
      row.className = "option-picker-row";
      var pill = document.createElement("span");
      pill.className = "table-tag-pill";
      pill.style.background = opt.color.bg;
      pill.style.color = opt.color.ink;
      pill.textContent = opt.label;
      row.appendChild(pill);
      row.addEventListener("click", function (e) {
        e.stopPropagation();
        optionPickerContext.card.properties[optionPickerContext.prop.id] = opt.id;
        saveState();
        renderTableCellContent(optionPickerContext.cell, optionPickerContext.card, optionPickerContext.prop);
        closeOptionPicker();
      });
      list.appendChild(row);
    });

  document.getElementById("option-picker-new-input").addEventListener("pointerdown", function (e) { e.stopPropagation(); });

  document.getElementById("option-picker-new-confirm").addEventListener("click", function (e) {
    e.stopPropagation();

    var input = document.getElementById("option-picker-new-input");
    var label = input.value.trim();
    if (!label) return;
    var prop = optionPickerContext.prop;
    if (!prop.options) prop.options = [];
    var color = nextTagColor(prop.options.length);
    var newOpt = { id: uid(), label: label, color: color };
    prop.options.push(newOpt);
    optionPickerContext.card.properties[prop.id] = newOpt.id;
    saveState();
    renderTableCellContent(optionPickerContext.cell, optionPickerContext.card, optionPickerContext.prop);
    closeOptionPicker();
  });

  function unstackGroup(group) {
    var cards = group.cardIds.map(function (id) {
      return state.cards.filter(function (c) { return c.id === id; })[0];
    }).filter(Boolean);
    cards.forEach(function (c, i) {
      c.x = group.x + i * (c.width + 20);
      c.y = group.y;
    });
    state.cardGroups = state.cardGroups.filter(function (g) { return g.id !== group.id; });
    saveState();
    var beforeUnstack = captureItemRects();
    refreshCanvas();
    playFlipAnimation(beforeUnstack);
  }

  // ---- YouTube helpers ----
  function parseYouTubeId(url) {
    url = url.trim();
    var patterns = [
      /(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/,
      /^([A-Za-z0-9_-]{11})$/  // bare ID
    ];
    for (var i = 0; i < patterns.length; i++) {
      var m = url.match(patterns[i]);
      if (m) return m[1];
    }
    return null;
  }

  function youtubeEmbedUrl(videoId) {
    return "https://www.youtube.com/embed/" + videoId + "?rel=0&modestbranding=1&enablejsapi=1";
  }

  function fetchYouTubeTitle(videoId, cb) {
    var url = "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" + videoId + "&format=json";
    fetch(url).then(function (r) { return r.json(); }).then(function (d) { cb(d.title || ""); }).catch(function () { cb(""); });
  }

      resizeHandle.setPointerCapture(e.pointerId);
      el.style.transition = "none";
      var startW = video.width, startH = video.height, startX = e.clientX, startY = e.clientY;
      var ratio = startW / startH;
      function move(ev) {
        var dx = (ev.clientX - startX) / scale;
        var newW = Math.max(240, startW + dx);
        video.width = newW; video.height = newW / ratio;
        el.style.width = newW + "px"; el.style.height = (newW / ratio) + "px";
      }
      function up(ev) {
        resizeHandle.removeEventListener("pointermove", move);
        resizeHandle.removeEventListener("pointerup", up);
        resizeHandle.releasePointerCapture(ev.pointerId);
        saveState(); clearAllTransitionOverrides();
      }
      resizeHandle.addEventListener("pointermove", move);
      resizeHandle.addEventListener("pointerup", up);
    });
    resizeHandle.addEventListener("click", function (e) { e.stopPropagation(); });

    return el;
  }

  function addVideoToBoard(videoId, title, cx, cy) {
    var w = 480, h = Math.round(w * 9 / 16) + 32; // 32 for toolbar
    var video = {
      id: uid(), videoId: videoId, title: title,
      x: cx - w / 2, y: cy - h / 2,
      width: w, height: h,
      muted: false, z: getMaxZ() + 1
    };
    state.videos.push(video);
    saveState(); refreshCanvas();
  }

  function promptAndAddVideo(cx, cy) {
    var url = prompt("Paste a YouTube URL:");
    if (!url) return;
    var id = parseYouTubeId(url);
    if (!id) { alert("Couldn't find a YouTube video ID in that URL."); return; }
    fetchYouTubeTitle(id, function (title) {
      addVideoToBoard(id, title, cx, cy);
    });
  }

  // ---- Video card block renderer ----
  function renderVideoBlock(block, blockEl) {
    var inner = blockEl.querySelector(".video-block-inner");
    inner.innerHTML = "";

    var urlRow = document.createElement("div");
    urlRow.className = "video-block-url-row";
    var urlInput = document.createElement("input");
    urlInput.className = "video-block-url-input";
    urlInput.placeholder = "Paste YouTube URL…";
    urlInput.value = block.videoUrl || "";
    urlInput.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
    urlRow.appendChild(urlInput);

    var embedBtn = document.createElement("button");
    embedBtn.className = "video-block-url-btn";
    embedBtn.textContent = "Embed";
    embedBtn.addEventListener("click", function () {
      var id = parseYouTubeId(urlInput.value);
      if (!id) { urlInput.style.borderColor = "#E07A7A"; return; }
      urlInput.style.borderColor = "";
      block.videoUrl = urlInput.value;
      block.videoId = id;
      saveBlocksToCard(getActiveCard()); saveState();
      renderVideoBlock(block, blockEl);
    });
    urlRow.appendChild(embedBtn);
    inner.appendChild(urlRow);

    if (block.videoId) {
      var embedWrap = document.createElement("div");
      embedWrap.className = "video-block-embed";
      var thumb = document.createElement("img");
      thumb.src = "https://img.youtube.com/vi/" + block.videoId + "/hqdefault.jpg";
      thumb.alt = "YouTube video";
      embedWrap.appendChild(thumb);
      var playOverlay = document.createElement("div");
      playOverlay.className = "video-item-play-overlay";
      var playBtn = document.createElement("div");
      playBtn.className = "video-item-play-btn";
      playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
      playOverlay.appendChild(playBtn);
      embedWrap.appendChild(playOverlay);
      embedWrap.addEventListener("click", function () {
        window.open("https://www.youtube.com/watch?v=" + block.videoId, "_blank", "noopener");
      });
      inner.appendChild(embedWrap);
    }
  }

  // ---- Toolbar video button ----
  document.getElementById("add-video-btn").addEventListener("click", function () {
    var rect = wrap.getBoundingClientRect();
    var cx = (rect.width / 2 - panX) / scale;
    var cy = (rect.height / 2 - panY) / scale;
    promptAndAddVideo(cx, cy);
  });

  // ---- Card block video button ----
  document.getElementById("btn-add-video").addEventListener("click", function () { addBlock("video"); });

  function refreshCanvas() {
    itemsLayer.innerHTML = "";
    state.containers.forEach(function (c) {
      try { renderContainer(c); } catch (err) { console.error("Failed to render container", c.id, err); }
    });
    getAllItemsByZ().forEach(function (entry) {
      try {
        if (entry.type === "card") renderCard(entry.ref);
        else if (entry.type === "image") renderImage(entry.ref);
        else if (entry.type === "shape") renderShape(entry.ref);
        else if (entry.type === "video") renderVideo(entry.ref);
        else if (entry.type === "group") renderCardGroup(entry.ref);
      } catch (err) { console.error("Failed to render item", entry.ref && entry.ref.id, err); }
    });
    renderConnections();
  }

  // ---- FLIP-style animation: capture positions before a layout-changing action,
  // then smoothly transition matching elements from their old spot to the new one. ----
  function captureItemRects() {
    var rects = {};
    document.querySelectorAll(".card, .img-item, .shape-item, .card-group-frame, .card-group-table").forEach(function (el) {
      var id = el.dataset.id;
      if (!id) return;
      rects[id + (el.classList.contains("card-group-table") ? ":table" : "")] = {
        left: parseFloat(el.style.left) || 0,
        top: parseFloat(el.style.top) || 0,
        width: parseFloat(el.style.width) || 0,
        height: parseFloat(el.style.height) || 0
      };
    });
    return rects;
  }

  function playFlipAnimation(beforeRects) {
    requestAnimationFrame(function () {
      var toAnimate = [];
      document.querySelectorAll(".card, .img-item, .shape-item, .card-group-frame, .card-group-table").forEach(function (el) {
        var id = el.dataset.id + (el.classList.contains("card-group-table") ? ":table" : "");
        var before = beforeRects[id];
        if (!before) return;
        var afterLeft = parseFloat(el.style.left) || 0;
        var afterTop = parseFloat(el.style.top) || 0;
        var afterWidth = parseFloat(el.style.width) || 0;
        var afterHeight = parseFloat(el.style.height) || 0;
        if (before.left === afterLeft && before.top === afterTop && before.width === afterWidth && before.height === afterHeight) return;

        el.style.transition = "none";
        el.style.left = before.left + "px";
        el.style.top = before.top + "px";
        el.style.width = before.width + "px";
        el.style.height = before.height + "px";
        toAnimate.push({ el: el, left: afterLeft, top: afterTop, width: afterWidth, height: afterHeight });
      });
      if (!toAnimate.length) return;
      toAnimate.forEach(function (item) { item.el.getBoundingClientRect(); });
      requestAnimationFrame(function () {
        toAnimate.forEach(function (item) {
          item.el.style.transition = "";
          item.el.style.left = item.left + "px";
          item.el.style.top = item.top + "px";
          item.el.style.width = item.width + "px";
          item.el.style.height = item.height + "px";
        });
      });
    });
  }

  // ---- Toolbar actions ----
  document.getElementById("add-card-btn").addEventListener("click", function (e) {
    var rect = wrap.getBoundingClientRect();
    var cx = (rect.width / 2 - panX) / scale;
    var cy = (rect.height / 2 - panY) / scale;
    var jitterX = (Math.random() - 0.5) * 40;
    var jitterY = (Math.random() - 0.5) * 40;
    var card = {
      id: uid(),
      title: "",
      notes: "",
      category: "idea",
      x: cx - 85 + jitterX,
      y: cy - 39 + jitterY,
      properties: {},
      z: getMaxZ() + 1
    };
    state.cards.push(card);
    saveState();
    refreshCanvas();
    openCardFromOrigin(card.id, e.currentTarget);
  });

  document.getElementById("image-input").addEventListener("change", function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      var rect = wrap.getBoundingClientRect();
      var cx = (rect.width / 2 - panX) / scale;
      var cy = (rect.height / 2 - panY) / scale;
      var img = {
        id: uid(),
        src: ev.target.result,
        x: cx - 110,
        y: cy - 82,
        width: 220,
        height: 165,
        rotation: Math.round((Math.random() * 8 - 4) * 10) / 10,
        z: getMaxZ() + 1
      };
      state.images.push(img);
      saveState();
      refreshCanvas();
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  });

  // ---- Seed sample cards on first run ----
  function seedIfEmpty() {
    if (state.cards.length || state.images.length) return;
    state.cards = [
      { id: uid(), title: "WSMR", notes: "Rough cut stage. Still need fishing footage from Lough Arrow.", category: "documentary", x: 60, y: 40 },
      { id: uid(), title: "Longhouse Studios", notes: "Site migrated to Squarespace.", category: "documentary", x: 60, y: 220 },
      { id: uid(), title: "William", notes: "Before, Brighton, After. Will versus conscience.", category: "fiction", x: 320, y: 60 },
      { id: uid(), title: "Qliphoth", notes: "Antagonist now fully formed.", category: "fiction", x: 540, y: 200 },
      { id: uid(), title: "Cloud Reflex", notes: "Four tracks live. Aiming for The Great Escape, 2027.", category: "music", x: 330, y: 320 }
    ];
    saveState();
  }

  // ---- Board title ----
  var boardTitleInput = document.getElementById("board-title-input");

  function resizeBoardTitleInput() {
    var text = boardTitleInput.value || boardTitleInput.placeholder;
    var w = measureGroupTitleWidth(text) + 30;
    boardTitleInput.style.width = Math.max(120, w) + "px";
  }

  boardTitleInput.addEventListener("input", function () {
    state.boardTitle = boardTitleInput.value;
    resizeBoardTitleInput();
  });
  boardTitleInput.addEventListener("change", function () {
    saveState();
  });

  // ---- Board texture ----
  (function applyBoardTexture() {
    var svg = [
      "<svg xmlns='http://www.w3.org/2000/svg' width='28' height='36'>",
      // Column 1 (x=3): two dashes, staggered
      "<rect x='3' y='2' width='1.2' height='8' rx='0.6' fill='rgba(61,51,42,0.07)'/>",
      "<rect x='3' y='17' width='1.2' height='7' rx='0.6' fill='rgba(61,51,42,0.05)'/>",
      // Column 2 (x=10): offset vertically
      "<rect x='10' y='6' width='1.2' height='7' rx='0.6' fill='rgba(61,51,42,0.06)'/>",
      "<rect x='10' y='21' width='1.2' height='9' rx='0.6' fill='rgba(61,51,42,0.04)'/>",
      // Column 3 (x=17)
      "<rect x='17' y='1' width='1.2' height='9' rx='0.6' fill='rgba(61,51,42,0.08)'/>",
      "<rect x='17' y='16' width='1.2' height='7' rx='0.6' fill='rgba(61,51,42,0.06)'/>",
      // Column 4 (x=24)
      "<rect x='24' y='5' width='1.2' height='6' rx='0.6' fill='rgba(61,51,42,0.05)'/>",
      "<rect x='24' y='18' width='1.2' height='8' rx='0.6' fill='rgba(61,51,42,0.04)'/>",
      "</svg>"
    ].join("");
    boardRect.style.backgroundImage = "url(\"data:image/svg+xml," + encodeURIComponent(svg) + "\")";
    boardRect.style.backgroundRepeat = "repeat";
  })();

  // ---- Init ----
  // ---- Drag images from browser onto canvas ----
  wrap.addEventListener("dragover", function (e) {
    // Accept image files and image URLs dragged from other browser tabs
    var dt = e.dataTransfer;
    var hasImage = false;
    if (dt.types) {
      for (var i = 0; i < dt.types.length; i++) {
        var t = dt.types[i];
        if (t === "Files" || t === "text/uri-list" || t === "text/html") { hasImage = true; break; }
      }
    }
    if (!hasImage) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  });

  wrap.addEventListener("drop", function (e) {
    e.preventDefault();
    var rect = wrap.getBoundingClientRect();
    var dropX = (e.clientX - rect.left - panX) / scale;
    var dropY = (e.clientY - rect.top - panY) / scale;

    function addImageFromSrc(src, w, h) {
      var aspect = (w && h) ? w / h : 4 / 3;
      var imgW = 260;
      var imgH = Math.round(imgW / aspect);
      var img = {
        id: uid(), src: src,
        x: dropX - imgW / 2, y: dropY - imgH / 2,
        width: imgW, height: imgH, rotation: 0, z: getMaxZ() + 1
      };
      state.images.push(img);
      saveState();
      refreshCanvas();
    }

    // 1. File drop (from desktop or browser download bar)
    var files = e.dataTransfer.files;
    if (files && files.length) {
      Array.from(files).forEach(function (file) {
        if (!file.type.startsWith("image/")) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
          var tempImg = new Image();
          tempImg.onload = function () { addImageFromSrc(ev.target.result, tempImg.width, tempImg.height); };
          tempImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
      return;
    }

    // 2. Image dragged from another browser tab — try URI list first
    var uriList = e.dataTransfer.getData("text/uri-list");
    if (uriList) {
      var urls = uriList.split("\n").map(function (u) { return u.trim(); }).filter(function (u) { return u && !u.startsWith("#"); });
      urls.forEach(function (url) {
        if (!/\.(png|jpg|jpeg|gif|webp|svg|avif)(\?.*)?$/i.test(url) && !url.startsWith("data:image")) return;
        var tempImg = new Image();
        tempImg.crossOrigin = "anonymous";
        tempImg.onload = function () { addImageFromSrc(url, tempImg.width, tempImg.height); };
        tempImg.onerror = function () { addImageFromSrc(url, 0, 0); }; // add anyway, unknown size
        tempImg.src = url;
      });
      if (urls.length) return;
    }

    // 3. HTML drop — extract img src from dragged HTML fragment
    var html = e.dataTransfer.getData("text/html");
    if (html) {
      var div = document.createElement("div");
      div.innerHTML = html;
      var imgs = div.querySelectorAll("img");
      imgs.forEach(function (imgEl) {
        var src = imgEl.src || imgEl.getAttribute("src");
        if (!src) return;
        var tempImg = new Image();
        tempImg.crossOrigin = "anonymous";
        tempImg.onload = function () { addImageFromSrc(src, tempImg.naturalWidth || 260, tempImg.naturalHeight || 195); };
        tempImg.onerror = function () { addImageFromSrc(src, 0, 0); };
        tempImg.src = src;
      });
    }
  });

  loadState();
  applyCanvasColor(state.canvasColor);
  applyBoardSize();
  seedIfEmpty();
  boardTitleInput.value = state.boardTitle;
  resizeBoardTitleInput();
  updateCanvasTransform();
  refreshCanvas();
})();
</script>
